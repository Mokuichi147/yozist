<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yozist - login</title>
<script>
  document.documentElement.setAttribute(
    'data-theme',
    window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  );
</script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  .hidden { display: none !important; }
</style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">

<div class="navbar bg-base-100 shadow-sm sticky top-0 z-30">
  <div class="flex-1 px-2 flex items-center gap-3">
    <a href="/ui" class="text-xl font-bold">yozist</a>
  </div>
</div>

<div class="card bg-base-100 shadow-md max-w-sm mx-auto mt-24">
  <div class="card-body">
    <h2 class="card-title text-sm uppercase tracking-wider opacity-70">ログイン</h2>
    <p class="text-sm opacity-70">アカウント名とパスワードを入力してください。</p>
    <form id="lf-form" action="/api/auth/login" method="post" autocomplete="on">
      <input id="lf-user" name="username" autocomplete="username"
             class="input input-bordered w-full" placeholder="username" required>
      <input id="lf-pw" name="password" type="password" autocomplete="current-password"
             class="input input-bordered w-full mt-2" placeholder="password" required>
      <button type="submit" class="btn btn-primary w-full mt-3">ログイン</button>
      <div class="text-center mt-2">
        <a href="#" id="register-btn" class="link link-primary text-sm">アカウントを新規作成する</a>
      </div>
      <div id="lf-error" class="text-xs text-error mt-2 hidden"></div>
    </form>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

function nextUrl() {
  const p = new URLSearchParams(location.search).get('next');
  if (p && p.startsWith('/ui')) return p;
  return '/ui';
}

function showError(msg) {
  const el = $('lf-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function doLogin() {
  $('lf-error').classList.add('hidden');
  const username = $('lf-user').value;
  const password = $('lf-pw').value;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!r.ok) throw new Error('ログイン失敗');
    const d = await r.json();
    localStorage.setItem('yozist_token', d.token);
    // ブラウザのパスワードマネージャーに保存をリクエスト
    if (window.PasswordCredential) {
      try {
        const cred = new PasswordCredential({ id: username, password, name: username });
        await navigator.credentials.store(cred);
      } catch (_) { /* ユーザーが拒否した場合などは無視 */ }
    }
    // ページ遷移することでブラウザのパスワード保存プロンプトを確実に発火させる
    location.href = nextUrl();
  } catch (e) {
    showError(String(e.message || e));
  }
}

async function doRegister() {
  $('lf-error').classList.add('hidden');
  const username = $('lf-user').value;
  const password = $('lf-pw').value;
  if (!username || !password) { showError('username / password を入力してください'); return; }
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!r.ok) throw new Error('登録失敗: ' + await r.text());
    await doLogin();
  } catch (e) {
    showError(String(e.message || e));
  }
}

$('lf-form').addEventListener('submit', (e) => { e.preventDefault(); doLogin(); });
$('register-btn').addEventListener('click', (e) => { e.preventDefault(); doRegister(); });

// 既にログイン済みなら遷移先に戻す
(async () => {
  const token = localStorage.getItem('yozist_token');
  if (!token) return;
  try {
    const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (!r.ok) return;
    const me = await r.json();
    if (!me.anonymous) location.href = nextUrl();
  } catch (_) {}
})();
</script>
</body>
</html>
