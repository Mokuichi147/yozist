<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yozist - compare</title>
<script>
  document.documentElement.setAttribute(
    'data-theme',
    window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  );
</script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  .hidden { display: none !important; }

  .diff-table {
    width: 100%; border-collapse: collapse; table-layout: fixed;
    font-size: 0.75rem; line-height: 1.5;
  }
  .diff-table td { vertical-align: top; }
  .diff-ln {
    text-align: right; padding: 0 0.5rem;
    color: rgba(127,127,127,0.7); user-select: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-right: 1px solid rgba(127,127,127,0.18);
  }
  .diff-marker {
    text-align: center; padding: 0 0.25rem; user-select: none;
    color: rgba(127,127,127,0.8);
  }
  .diff-code {
    padding: 0 0.5rem; white-space: pre-wrap; word-break: break-word;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .diff-add { background: rgba(63,185,80,0.14); }
  .diff-add .diff-marker { color: #2ea043; }
  .diff-del { background: rgba(248,81,73,0.14); }
  .diff-del .diff-marker { color: #f85149; }
  .diff-add-inline { background: rgba(63,185,80,0.40); border-radius: 0.125rem; }
  .diff-del-inline { background: rgba(248,81,73,0.40); border-radius: 0.125rem; }
  .diff-empty { background: rgba(127,127,127,0.06); }
  .diff-gap td {
    text-align: center; padding: 0.25rem; font-size: 0.7rem;
    background: rgba(127,127,127,0.10); color: rgba(127,127,127,0.9);
    cursor: pointer; user-select: none;
  }
  .diff-gap:hover td { background: rgba(127,127,127,0.18); }
</style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">

<div class="navbar bg-base-100 shadow-sm sticky top-0 z-30">
  <div class="flex-1 px-2 flex items-center gap-3">
    <a href="/ui" class="text-xl font-bold">yozist</a>
    <div class="tabs tabs-boxed tabs-sm">
      <a href="/ui/files" class="tab">files</a>
      <a id="back-detail" href="#" class="tab">detail</a>
      <span class="tab tab-active">compare</span>
    </div>
  </div>
  <div class="flex-none flex items-center gap-3 px-2">
    <a id="me" href="/ui/settings" class="btn btn-sm btn-ghost normal-case" title="ユーザー設定">…</a>
    <button id="logout" class="btn btn-sm btn-ghost">ログアウト</button>
  </div>
</div>

<div id="not-found" class="hidden max-w-md mx-auto mt-24">
  <div class="alert alert-error">
    <span id="not-found-msg">ファイルが見つかりません。</span>
  </div>
</div>

<div id="main" class="hidden max-w-6xl mx-auto p-4">
  <div class="mb-3 text-sm">
    <a id="back-link" href="#" class="link link-hover">← ファイル詳細へ戻る</a>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <h2 id="cmp-name" class="card-title text-lg break-all">…</h2>

      <div class="divider my-2"></div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="text-xs uppercase tracking-wider opacity-60 font-semibold">比較元 (旧)</label>
          <select id="sel-base" class="select select-bordered select-sm w-full mt-1"></select>
        </div>
        <div>
          <label class="text-xs uppercase tracking-wider opacity-60 font-semibold">比較先 (新)</label>
          <select id="sel-compare" class="select select-bordered select-sm w-full mt-1"></select>
        </div>
      </div>

      <div class="flex items-center justify-between flex-wrap gap-2 mt-3">
        <div id="cmp-stats" class="text-xs"></div>
        <div class="flex items-center gap-2">
          <span class="text-xs opacity-60">表示</span>
          <div class="join">
            <button id="view-unified" class="btn btn-xs join-item btn-active">unified</button>
            <button id="view-split" class="btn btn-xs join-item">split</button>
          </div>
        </div>
      </div>

      <div class="divider my-2"></div>

      <div id="cmp-message" class="hidden alert alert-info text-sm my-2"></div>
      <div id="cmp-diff" class="overflow-x-auto rounded border border-base-300"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let token = localStorage.getItem('yozist_token') || '';

const parts = location.pathname.split('/').filter(Boolean);
// /ui/files/:id/compare → ['ui','files',':id','compare']
const fileId = parts[2];
const qs = new URLSearchParams(location.search);

let history = [];
let currentCommitId = null;
let viewMode = 'unified';
const contentCache = new Map();
const expanded = new Set(); // 展開済みの equal セグメント index

function api(path, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, token ? { Authorization: 'Bearer ' + token } : {});
  return fetch(path, opts);
}
function json(path, opts) {
  return api(path, opts).then(async r => {
    if (!r.ok) return Promise.reject(r);
    if (r.status === 204) return null;
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
function fmtTs(ts) {
  if (typeof ts === 'string') return ts.replace('T', ' ').slice(0, 19);
  if (Array.isArray(ts) && ts.length >= 5) {
    const [y, doy, h, m, s] = ts;
    const d = new Date(Date.UTC(y, 0, doy));
    const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(d.getUTCDate()).padStart(2, '0');
    const pad = n => String(n).padStart(2, '0');
    return `${y}-${mm}-${dd} ${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  return String(ts ?? '');
}
function redirectToLogin() {
  const next = encodeURIComponent(location.pathname + location.search);
  location.href = '/ui/login?next=' + next;
}
function logout() {
  localStorage.removeItem('yozist_token');
  redirectToLogin();
}
$('logout').onclick = logout;

const detailUrl = '/ui/files/' + fileId;
$('back-detail').href = detailUrl;
$('back-link').href = detailUrl;

async function fetchContent(commitId) {
  if (contentCache.has(commitId)) return contentCache.get(commitId);
  const r = await api(`/api/files/${fileId}/commits/${commitId}`);
  if (!r.ok) throw r;
  const text = await r.text();
  contentCache.set(commitId, text);
  return text;
}

function looksBinary(s) {
  if (s.indexOf('\u0000') !== -1) return true;
  // 制御文字 (タブ/改行/復帰を除く) が多ければバイナリ扱い
  let ctrl = 0;
  const lim = Math.min(s.length, 4096);
  for (let i = 0; i < lim; i++) {
    const c = s.charCodeAt(i);
    if (c < 9 || (c > 13 && c < 32)) ctrl++;
  }
  return ctrl > lim * 0.1;
}

// --- LCS ベースの行/文字差分 ---
function lcsDiff(a, b) {
  const n = a.length, m = b.length;
  const dp = [];
  for (let i = 0; i <= n; i++) dp.push(new Int32Array(m + 1));
  for (let i = n - 1; i >= 0; i--) {
    const row = dp[i], next = dp[i + 1];
    for (let j = m - 1; j >= 0; j--) {
      row[j] = a[i] === b[j] ? next[j + 1] + 1 : (next[j] >= row[j + 1] ? next[j] : row[j + 1]);
    }
  }
  const ops = [];
  let i = 0, j = 0;
  while (i < n && j < m) {
    if (a[i] === b[j]) ops.push({ t: '=', a: i++, b: j++ });
    else if (dp[i + 1][j] >= dp[i][j + 1]) ops.push({ t: '-', a: i++ });
    else ops.push({ t: '+', b: j++ });
  }
  while (i < n) ops.push({ t: '-', a: i++ });
  while (j < m) ops.push({ t: '+', b: j++ });
  return ops;
}

// 1 行ペアの語句単位ハイライト
function inlineDiff(oldStr, newStr) {
  if (oldStr.length > 400 || newStr.length > 400) {
    return {
      oldHtml: `<span class="diff-del-inline">${escapeHtml(oldStr)}</span>`,
      newHtml: `<span class="diff-add-inline">${escapeHtml(newStr)}</span>`,
    };
  }
  const ops = lcsDiff([...oldStr], [...newStr]);
  let oldHtml = '', newHtml = '';
  let i = 0;
  while (i < ops.length) {
    const t = ops[i].t;
    let buf = '';
    while (i < ops.length && ops[i].t === t) {
      buf += t === '+' ? newStr[ops[i].b] : (t === '-' ? oldStr[ops[i].a] : oldStr[ops[i].a]);
      i++;
    }
    const esc = escapeHtml(buf);
    if (t === '=') { oldHtml += esc; newHtml += esc; }
    else if (t === '-') { oldHtml += `<span class="diff-del-inline">${esc}</span>`; }
    else { newHtml += `<span class="diff-add-inline">${esc}</span>`; }
  }
  return { oldHtml, newHtml };
}

// ops を equal / change セグメントへ分割
function buildSegments(ops, oldLines, newLines) {
  const segs = [];
  let i = 0;
  while (i < ops.length) {
    if (ops[i].t === '=') {
      const lines = [];
      while (i < ops.length && ops[i].t === '=') {
        lines.push({ old: ops[i].a, new: ops[i].b, text: oldLines[ops[i].a] });
        i++;
      }
      segs.push({ type: 'equal', lines });
    } else {
      const dels = [], adds = [];
      while (i < ops.length && ops[i].t !== '=') {
        if (ops[i].t === '-') dels.push({ old: ops[i].a, text: oldLines[ops[i].a] });
        else adds.push({ new: ops[i].b, text: newLines[ops[i].b] });
        i++;
      }
      segs.push({ type: 'change', dels, adds });
    }
  }
  return segs;
}

const CONTEXT = 3;

function gapRowUnified(count, segIdx) {
  return `<tr class="diff-gap" data-seg="${segIdx}">
    <td colspan="4">⋯ ${count} 行を展開</td></tr>`;
}
function gapRowSplit(count, segIdx) {
  return `<tr class="diff-gap" data-seg="${segIdx}">
    <td colspan="4">⋯ ${count} 行を展開</td></tr>`;
}

function renderEqualUnified(seg, segIdx, isFirst, isLast) {
  const lines = seg.lines;
  const full = expanded.has(segIdx) || lines.length <= CONTEXT * 2 + 1;
  let out = '';
  const lineRow = ln =>
    `<tr><td class="diff-ln">${ln.old + 1}</td><td class="diff-ln">${ln.new + 1}</td>` +
    `<td class="diff-marker"> </td><td class="diff-code">${escapeHtml(ln.text)}</td></tr>`;
  if (full) {
    for (const ln of lines) out += lineRow(ln);
    return out;
  }
  const head = isFirst ? 0 : CONTEXT;
  const tail = isLast ? 0 : CONTEXT;
  for (let k = 0; k < head; k++) out += lineRow(lines[k]);
  const hidden = lines.length - head - tail;
  if (hidden > 0) out += gapRowUnified(hidden, segIdx);
  for (let k = lines.length - tail; k < lines.length; k++) out += lineRow(lines[k]);
  return out;
}

function renderChangeUnified(seg) {
  let out = '';
  const max = Math.max(seg.dels.length, seg.adds.length);
  for (let k = 0; k < max; k++) {
    const d = seg.dels[k], a = seg.adds[k];
    let dHtml, aHtml;
    if (d && a) { const r = inlineDiff(d.text, a.text); dHtml = r.oldHtml; aHtml = r.newHtml; }
    else { dHtml = d ? escapeHtml(d.text) : null; aHtml = a ? escapeHtml(a.text) : null; }
    if (d) out += `<tr class="diff-del"><td class="diff-ln">${d.old + 1}</td>` +
      `<td class="diff-ln"></td><td class="diff-marker">-</td><td class="diff-code">${dHtml}</td></tr>`;
    if (a) out += `<tr class="diff-add"><td class="diff-ln"></td>` +
      `<td class="diff-ln">${a.new + 1}</td><td class="diff-marker">+</td><td class="diff-code">${aHtml}</td></tr>`;
  }
  return out;
}

function renderEqualSplit(seg, segIdx, isFirst, isLast) {
  const lines = seg.lines;
  const full = expanded.has(segIdx) || lines.length <= CONTEXT * 2 + 1;
  let out = '';
  const lineRow = ln =>
    `<tr><td class="diff-ln">${ln.old + 1}</td><td class="diff-code">${escapeHtml(ln.text)}</td>` +
    `<td class="diff-ln">${ln.new + 1}</td><td class="diff-code">${escapeHtml(ln.text)}</td></tr>`;
  if (full) { for (const ln of lines) out += lineRow(ln); return out; }
  const head = isFirst ? 0 : CONTEXT;
  const tail = isLast ? 0 : CONTEXT;
  for (let k = 0; k < head; k++) out += lineRow(lines[k]);
  const hidden = lines.length - head - tail;
  if (hidden > 0) out += gapRowSplit(hidden, segIdx);
  for (let k = lines.length - tail; k < lines.length; k++) out += lineRow(lines[k]);
  return out;
}

function renderChangeSplit(seg) {
  let out = '';
  const max = Math.max(seg.dels.length, seg.adds.length);
  for (let k = 0; k < max; k++) {
    const d = seg.dels[k], a = seg.adds[k];
    let dHtml, aHtml;
    if (d && a) { const r = inlineDiff(d.text, a.text); dHtml = r.oldHtml; aHtml = r.newHtml; }
    else { dHtml = d ? escapeHtml(d.text) : ''; aHtml = a ? escapeHtml(a.text) : ''; }
    const left = d
      ? `<td class="diff-ln">${d.old + 1}</td><td class="diff-code diff-del">${dHtml}</td>`
      : `<td class="diff-ln diff-empty"></td><td class="diff-code diff-empty"></td>`;
    const right = a
      ? `<td class="diff-ln">${a.new + 1}</td><td class="diff-code diff-add">${aHtml}</td>`
      : `<td class="diff-ln diff-empty"></td><td class="diff-code diff-empty"></td>`;
    out += `<tr>${left}${right}</tr>`;
  }
  return out;
}

function renderDiff(segs) {
  let body = '';
  segs.forEach((seg, idx) => {
    const isFirst = idx === 0, isLast = idx === segs.length - 1;
    if (viewMode === 'unified') {
      body += seg.type === 'equal'
        ? renderEqualUnified(seg, idx, isFirst, isLast)
        : renderChangeUnified(seg);
    } else {
      body += seg.type === 'equal'
        ? renderEqualSplit(seg, idx, isFirst, isLast)
        : renderChangeSplit(seg);
    }
  });
  const colgroup = viewMode === 'unified'
    ? `<colgroup><col style="width:3rem"><col style="width:3rem"><col style="width:1.5rem"><col></colgroup>`
    : `<colgroup><col style="width:3rem"><col style="width:calc(50% - 3rem)"><col style="width:3rem"><col></colgroup>`;
  $('cmp-diff').innerHTML = `<table class="diff-table">${colgroup}${body}</table>`;
  $('cmp-diff').querySelectorAll('.diff-gap').forEach(el => {
    el.onclick = () => { expanded.add(parseInt(el.dataset.seg, 10)); renderDiff(segs); };
  });
}

let lastSegs = null;

function update() {
  const baseId = $('sel-base').value;
  const compareId = $('sel-compare').value;
  const newUrl = `${location.pathname}?base=${baseId}&compare=${compareId}`;
  window.history.replaceState(null, '', newUrl);
  expanded.clear();
  $('cmp-message').classList.add('hidden');

  Promise.all([fetchContent(baseId), fetchContent(compareId)]).then(([oldText, newText]) => {
    if (looksBinary(oldText) || looksBinary(newText)) {
      $('cmp-stats').textContent = '';
      $('cmp-diff').innerHTML = '';
      $('cmp-message').textContent = 'バイナリデータのため差分表示できません。';
      $('cmp-message').classList.remove('hidden');
      return;
    }
    if (oldText === newText) {
      $('cmp-stats').innerHTML = '<span class="opacity-60">差分はありません</span>';
      $('cmp-diff').innerHTML = '';
      return;
    }
    const oldLines = oldText.split('\n');
    const newLines = newText.split('\n');
    if (oldLines.length * newLines.length > 4_000_000) {
      $('cmp-stats').textContent = '';
      $('cmp-diff').innerHTML = '';
      $('cmp-message').textContent =
        'ファイルが大きすぎるため差分表示できません（行数が多すぎます）。';
      $('cmp-message').classList.remove('hidden');
      return;
    }
    const ops = lcsDiff(oldLines, newLines);
    let added = 0, removed = 0;
    for (const o of ops) { if (o.t === '+') added++; else if (o.t === '-') removed++; }
    $('cmp-stats').innerHTML =
      `<span class="text-success font-semibold">+${added}</span> ` +
      `<span class="text-error font-semibold">-${removed}</span> ` +
      `<span class="opacity-60">行</span>`;
    lastSegs = buildSegments(ops, oldLines, newLines);
    renderDiff(lastSegs);
  }).catch(() => {
    $('cmp-diff').innerHTML = '';
    $('cmp-message').textContent = 'コミット内容の取得に失敗しました。';
    $('cmp-message').classList.remove('hidden');
  });
}

function optionLabel(c) {
  const time = fmtTs(c.timestamp);
  const star = c.id === currentCommitId ? '★ ' : '';
  const msg = c.message ? ` — ${c.message}` : '';
  return `${star}${time}  ${c.format_id || c.id.slice(0, 8)}${msg}`;
}

function buildSelectors() {
  const opts = history.map(c =>
    `<option value="${c.id}">${escapeHtml(optionLabel(c))}</option>`).join('');
  $('sel-base').innerHTML = opts;
  $('sel-compare').innerHTML = opts;

  // 既定: compare = current、base = それより 1 つ古いコミット
  const sorted = history.slice().sort((a, b) =>
    fmtTs(b.timestamp).localeCompare(fmtTs(a.timestamp)));
  const curIdx = sorted.findIndex(c => c.id === currentCommitId);
  const defCompare = currentCommitId || (sorted[0] && sorted[0].id);
  const defBase = (curIdx >= 0 && sorted[curIdx + 1]) ? sorted[curIdx + 1].id
    : (sorted[1] ? sorted[1].id : defCompare);

  $('sel-base').value = qs.get('base') || defBase || '';
  $('sel-compare').value = qs.get('compare') || defCompare || '';
  // 値が history に無い場合のフォールバック
  if (!$('sel-base').value && history[0]) $('sel-base').value = history[0].id;
  if (!$('sel-compare').value && history[0]) $('sel-compare').value = history[0].id;

  $('sel-base').onchange = update;
  $('sel-compare').onchange = update;
}

$('view-unified').onclick = () => {
  if (viewMode === 'unified') return;
  viewMode = 'unified';
  $('view-unified').classList.add('btn-active');
  $('view-split').classList.remove('btn-active');
  if (lastSegs) renderDiff(lastSegs);
};
$('view-split').onclick = () => {
  if (viewMode === 'split') return;
  viewMode = 'split';
  $('view-split').classList.add('btn-active');
  $('view-unified').classList.remove('btn-active');
  if (lastSegs) renderDiff(lastSegs);
};

async function init() {
  if (!token) { redirectToLogin(); return; }
  try {
    const me = await json('/api/auth/me');
    if (me.anonymous) { logout(); return; }
    $('me').textContent = me.user.display_name || me.user.username;
  } catch (e) { redirectToLogin(); return; }

  let file;
  try {
    [file, history] = await Promise.all([
      json('/api/files/' + fileId),
      json(`/api/files/${fileId}/history`),
    ]);
  } catch (e) {
    $('not-found-msg').textContent = 'ファイルが見つかりません、または閲覧権限がありません。';
    $('not-found').classList.remove('hidden');
    return;
  }
  if (!history || history.length === 0) {
    $('not-found-msg').textContent = 'このファイルには履歴がありません。';
    $('not-found').classList.remove('hidden');
    return;
  }
  currentCommitId = file.current_commit;
  document.title = `yozist - ${file.display_name} の比較`;
  $('main').classList.remove('hidden');
  $('cmp-name').textContent = file.display_name;

  buildSelectors();
  update();
}

init();
</script>
</body>
</html>
