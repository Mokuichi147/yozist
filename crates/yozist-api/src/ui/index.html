<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yozist</title>
<script>
  // OS のダーク設定に追従 (Tailwind/daisyUI が DOM を見る前に data-theme を確定させる)
  document.documentElement.setAttribute(
    'data-theme',
    window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  );
</script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  /* CDN ロード完了前のフラッシュ防止 */
  .hidden { display: none !important; }
  /* row-compact: Tailwind 拡張に頼らず純 CSS で */
  .row-compact { padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-size: 0.875rem; }
  .row-compact:hover { background: rgba(127,127,127,0.12); }
</style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">

<div class="navbar bg-base-100 shadow-sm sticky top-0 z-30">
  <div class="flex-1 px-2 flex items-center gap-3">
    <a href="/ui" class="text-xl font-bold">yozist</a>
    <div class="tabs tabs-boxed tabs-sm">
      <a href="/ui/files" class="tab">files</a>
    </div>
  </div>
  <div class="flex-none flex items-center gap-3 px-2">
    <span id="me" class="text-sm opacity-70">…</span>
    <button id="logout" class="btn btn-sm btn-ghost">ログアウト</button>
  </div>
</div>

<!-- メイン -->
<div id="main" class="hidden max-w-7xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-[240px_1fr] gap-4">

    <!-- 左カラム: tags / series -->
    <div class="space-y-4">
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold mb-2">tags</h2>
          <ul class="menu menu-sm p-0 max-h-[60vh] overflow-y-auto w-full" id="tag-list"></ul>
        </div>
      </div>
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold mb-2">series</h2>
          <ul class="menu menu-sm p-0 max-h-[60vh] overflow-y-auto w-full" id="series-list"></ul>
        </div>
      </div>
    </div>

    <!-- 右カラム: upload / groups / queries / shares / audit -->
    <div class="space-y-4">

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">upload</h2>
            <a href="/ui/files" class="text-xs link link-primary">ファイル一覧へ →</a>
          </div>
          <div class="space-y-2">
            <input id="upload-name" class="input input-bordered input-sm w-full"
                   placeholder="新規ファイル名 (例: memo.md)">
            <textarea id="upload-content" class="textarea textarea-bordered w-full text-sm"
                      placeholder="本文 (省略可)" rows="3"></textarea>
            <div class="flex flex-wrap items-center gap-2">
              <input type="file" id="upload-file" class="file-input file-input-bordered file-input-xs flex-1 min-w-[160px]">
              <button class="btn btn-primary btn-sm" onclick="doUpload()">登録</button>
            </div>
            <div id="upload-result" class="text-xs"></div>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">groups</h2>
            <button class="btn btn-xs" onclick="createGroup()">+ 新規</button>
          </div>
          <div id="group-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">saved queries</h2>
            <button class="btn btn-xs" onclick="createQuery()">+ 新規</button>
          </div>
          <div id="query-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">active shares</h2>
            <button class="btn btn-xs btn-ghost" onclick="loadShares()">refresh</button>
          </div>
          <div id="share-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">audit log</h2>
            <button class="btn btn-xs btn-ghost" onclick="loadAudit()">refresh</button>
          </div>
          <div id="audit-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let token = localStorage.getItem('yozist_token') || '';

function api(path, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, token ? { Authorization: 'Bearer ' + token } : {});
  return fetch(path, opts);
}
function json(path, opts) {
  opts = opts || {};
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof ArrayBuffer)) {
    opts.body = JSON.stringify(opts.body);
    opts.headers = Object.assign({}, opts.headers, { 'content-type': 'application/json' });
  }
  return api(path, opts).then(async r => {
    if (!r.ok) return Promise.reject(r);
    if (r.status === 204) return null;
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  });
}

function redirectToLogin() {
  const next = encodeURIComponent(location.pathname + location.search);
  location.href = '/ui/login?next=' + next;
}
function logout() {
  localStorage.removeItem('yozist_token');
  token = '';
  redirectToLogin();
}

async function init() {
  if (!token) { redirectToLogin(); return; }
  try {
    const me = await json('/api/auth/me');
    if (me.anonymous) return logout();
    $('me').textContent = me.user.username;
    $('main').classList.remove('hidden');
    await refresh();
  } catch (e) { logout(); }
}

async function refresh() {
  await Promise.all([loadTags(), loadSeries(), loadShares(), loadAudit(), loadQueries(), loadGroups()]);
}

async function loadGroups() {
  const el = $('group-list');
  try {
    const list = await json('/api/groups');
    const byId = Object.fromEntries(list.map(g => [g.id, g]));
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">グループなし</div>'; return; }
    el.innerHTML = list.map(g => {
      const parent = g.parent_id ? ` <span class="text-xs opacity-60">⊂ ${escapeHtml(byId[g.parent_id]?.name || '?')}</span>` : '';
      return `<div class="flex items-center justify-between row-compact">
        <div><span class="font-semibold">${escapeHtml(g.name)}</span>${parent}</div>
        <button class="btn btn-xs" onclick="manageGroupMembers('${g.id}','${escapeHtml(g.name)}')">メンバー</button>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function createGroup() {
  const name = prompt('グループ名');
  if (!name) return;
  await json('/api/groups', { method: 'POST', body: { name } });
  await loadGroups();
}

async function manageGroupMembers(groupId, groupName) {
  const [members, users] = await Promise.all([
    json(`/api/groups/${groupId}/members`),
    json('/api/users'),
  ]);
  const usersById = Object.fromEntries(users.map(u => [u.id, u.username]));
  const memberNames = members.map(uid => usersById[uid] || uid.slice(0, 8)).join(', ') || '(なし)';
  const action = prompt(
    `グループ "${groupName}" メンバー:\n${memberNames}\n\n` +
    `1: ユーザー追加\n2: ユーザー除外\nそれ以外: キャンセル`,
    '1'
  );
  if (action === '1') {
    const list = users.map((u, i) => `${i + 1}: ${u.username}`).join('\n');
    const sel = prompt(`追加するユーザー番号:\n${list}`, '1');
    const idx = parseInt(sel || '0', 10) - 1;
    if (idx < 0 || idx >= users.length) return;
    await api(`/api/groups/${groupId}/members`, {
      method: 'POST',
      body: JSON.stringify({ user_id: users[idx].id }),
      headers: { 'content-type': 'application/json' },
    });
    alert('追加しました');
  } else if (action === '2') {
    if (members.length === 0) return alert('メンバーがいません');
    const list = members.map((uid, i) => `${i + 1}: ${usersById[uid] || uid.slice(0, 8)}`).join('\n');
    const sel = prompt(`除外するメンバー番号:\n${list}`, '1');
    const idx = parseInt(sel || '0', 10) - 1;
    if (idx < 0 || idx >= members.length) return;
    await api(`/api/groups/${groupId}/members/${members[idx]}`, { method: 'DELETE' });
    alert('除外しました');
  }
}

async function loadQueries() {
  const el = $('query-list');
  try {
    const list = await fetch('/api/queries').then(r => r.json());
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">保存クエリなし</div>'; return; }
    el.innerHTML = list.map(q => {
      const cond = [];
      if (q.query.tags_and && q.query.tags_and.length) cond.push('AND: ' + q.query.tags_and.join(','));
      if (q.query.tags_not && q.query.tags_not.length) cond.push('NOT: ' + q.query.tags_not.join(','));
      return `<div class="flex items-center justify-between row-compact">
        <div>
          <span class="font-semibold">${escapeHtml(q.name)}</span>
          <span class="text-xs opacity-60 ml-1">${cond.join(' / ') || '全件'}</span>
        </div>
        <div class="flex gap-1">
          <button class="btn btn-xs" onclick="shareQuery('${q.id}','${escapeHtml(q.name)}')">共有</button>
          <button class="btn btn-xs btn-error btn-outline" onclick="deleteQuery('${q.id}')">削除</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function createQuery() {
  const name = prompt('保存クエリ名');
  if (!name) return;
  const tagsAnd = prompt('AND タグ (カンマ区切り、空可)', '');
  const tagsNot = prompt('NOT タグ (カンマ区切り、空可)', '');
  const body = {
    name,
    tags_and: tagsAnd ? tagsAnd.split(',').map(s => s.trim()).filter(Boolean) : [],
    tags_not: tagsNot ? tagsNot.split(',').map(s => s.trim()).filter(Boolean) : [],
  };
  await json('/api/queries', { method: 'POST', body });
  await loadQueries();
}

async function deleteQuery(id) {
  if (!confirm('削除しますか？')) return;
  await api(`/api/queries/${id}`, { method: 'DELETE' });
  await loadQueries();
}

async function shareQuery(id, name) {
  const ttl = prompt(`"${name}" の共有URL TTL (秒)`, '3600');
  if (!ttl) return;
  const r = await json(`/api/queries/${id}/share`, {
    method: 'POST',
    body: { ttl_secs: parseInt(ttl, 10) },
  });
  const fullUrl = location.origin + r.url;
  prompt('クエリ共有URL (コピーしてください):', fullUrl);
  await loadShares();
}


async function loadTags() {
  const tags = await fetch('/api/tags').then(r => r.json());
  const el = $('tag-list');
  el.innerHTML = '';
  if (tags.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs px-2 py-1">タグなし</div>'; return; }
  tags.forEach(t => {
    const li = document.createElement('li');
    const icon = t.kind === 'system' ? '⚙' : t.kind === 'ai' ? '🤖' : '';
    const a = document.createElement('a');
    a.className = 'flex items-center justify-between gap-1 px-2 py-1 rounded hover:bg-base-200';
    a.href = '/ui/files?tags=' + encodeURIComponent(t.name);
    a.title = 'このタグでファイル一覧を絞り込む';
    a.innerHTML = `<span class="flex-1 truncate">${escapeHtml(t.name)} ${icon}</span>`;
    const renameBtn = document.createElement('button');
    renameBtn.className = 'btn btn-xs btn-ghost px-1';
    renameBtn.title = 'リネーム';
    renameBtn.textContent = '✎';
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-xs btn-ghost px-1 text-error';
    delBtn.title = '削除';
    delBtn.textContent = '×';
    a.append(renameBtn, delBtn);
    renameBtn.onclick = async (e) => {
      e.stopPropagation(); e.preventDefault();
      const name = prompt('新しいタグ名', t.name);
      if (!name || name === t.name) return;
      await api(`/api/tags/${t.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ name }),
        headers: { 'content-type': 'application/json' },
      });
      await refresh();
    };
    delBtn.onclick = async (e) => {
      e.stopPropagation(); e.preventDefault();
      if (!confirm(`タグ "${t.name}" を削除しますか？\n(ファイル本体は残りますが、このタグの紐付けは全て解除されます)`)) return;
      await api(`/api/tags/${t.id}`, { method: 'DELETE' });
      await refresh();
    };
    li.appendChild(a);
    el.appendChild(li);
  });
}

async function loadSeries() {
  const list = await fetch('/api/series').then(r => r.json());
  const el = $('series-list');
  el.innerHTML = '';
  if (list.length === 0) {
    el.innerHTML = '<div class="opacity-50 text-xs px-2 py-1">シリーズなし</div>';
  } else {
    list.forEach(s => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'flex items-center justify-between gap-1 px-2 py-1 rounded hover:bg-base-200';
      a.title = s.description || '';
      a.innerHTML = `<span class="flex-1 truncate">${escapeHtml(s.name)}</span>`;
      const renameBtn = document.createElement('button');
      renameBtn.className = 'btn btn-xs btn-ghost px-1';
      renameBtn.title = 'リネーム';
      renameBtn.textContent = '✎';
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-xs btn-ghost px-1 text-error';
      delBtn.title = '削除';
      delBtn.textContent = '×';
      a.append(renameBtn, delBtn);
      renameBtn.onclick = async (e) => {
        e.stopPropagation(); e.preventDefault();
        const name = prompt('新しいシリーズ名', s.name);
        if (!name) return;
        const description = prompt('説明 (空可)', s.description || '');
        await api(`/api/series/${s.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ name, description: description || null }),
          headers: { 'content-type': 'application/json' },
        });
        await refresh();
      };
      delBtn.onclick = async (e) => {
        e.stopPropagation(); e.preventDefault();
        if (!confirm(`シリーズ "${s.name}" を削除しますか？\n(ファイル本体は残ります)`)) return;
        await api(`/api/series/${s.id}`, { method: 'DELETE' });
        await refresh();
      };
      a.onclick = async (e) => {
        if (e.target === renameBtn || e.target === delBtn) return;
        const members = await fetch('/api/series/' + s.id + '/members').then(r => r.json());
        alert(`series "${s.name}"\nメンバー: ${members.length}件\n` + members.map(m =>
          `[${m.order_index}] ${m.file_id.slice(0,8)}…`).join('\n'));
      };
      li.appendChild(a);
      el.appendChild(li);
    });
  }
  // 「+ 新規シリーズ」リンク
  const add = document.createElement('li');
  const addLink = document.createElement('a');
  addLink.className = 'text-xs text-primary px-2 py-1';
  addLink.href = '#';
  addLink.textContent = '+ 新規シリーズ';
  addLink.onclick = async (e) => {
    e.preventDefault();
    const name = prompt('シリーズ名');
    if (!name) return;
    await json('/api/series', { method: 'POST', body: { name } });
    await refresh();
  };
  add.appendChild(addLink);
  el.appendChild(add);
}

async function loadShares() {
  const el = $('share-list');
  try {
    const list = await json('/api/shares');
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">発行済み共有なし</div>'; return; }
    el.innerHTML = list.map(s => {
      const revoked = s.revoked_at ? ' <span class="badge badge-error badge-sm">失効</span>' : '';
      const fullJti = s.jti;
      return `<div class="flex items-center justify-between row-compact">
        <span><span class="badge badge-ghost badge-sm">${escapeHtml(s.kind)}</span>
          <span class="opacity-70">${s.target_id.slice(0,8)}…</span>${revoked}</span>
        ${!s.revoked_at ? `<button class="btn btn-xs btn-error btn-outline" onclick="revokeShare('${fullJti}')">失効</button>` : ''}
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function revokeShare(jti) {
  if (!confirm('失効しますか？')) return;
  const r = await api(`/api/shares/${jti}`, { method: 'DELETE' });
  if (!r.ok) return alert('失効失敗');
  await loadShares();
}

async function loadAudit() {
  const el = $('audit-list');
  try {
    const list = await json('/api/audit?limit=15');
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">監査記録なし</div>'; return; }
    el.innerHTML = list.map(a => {
      const ok = a.result.startsWith('ok');
      const status = ok
        ? '<span class="text-success">✓</span>'
        : '<span class="text-error">✗</span>';
      const time = fmtTs(a.timestamp);
      return `<div class="row-compact text-xs">
        ${status} <span class="opacity-70">${time}</span>
        <span class="font-semibold">${escapeHtml(a.actor_label || '-')}</span>
        ${escapeHtml(a.action)} ${escapeHtml(a.target_type || '')}
        ${a.target_ref ? '<span class="opacity-60">'+a.target_ref.slice(0,8)+'…</span>' : ''}
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function doUpload() {
  const fileInput = $('upload-file');
  let name = $('upload-name').value.trim();
  let body;
  if (fileInput.files.length > 0) {
    const f = fileInput.files[0];
    if (!name) name = f.name;
    body = await f.arrayBuffer();
  } else {
    if (!name) return alert('ファイル名 or アップロードファイルを指定してください');
    body = new TextEncoder().encode($('upload-content').value || '').buffer;
  }
  const r = await api('/api/files?name=' + encodeURIComponent(name), {
    method: 'POST',
    body,
    headers: { 'content-type': 'application/octet-stream' },
  });
  if (!r.ok) return alert('登録失敗: ' + await r.text());
  const meta = await r.json();
  $('upload-name').value = '';
  $('upload-content').value = '';
  fileInput.value = '';
  $('upload-result').innerHTML =
    `登録しました: <a class="link link-primary" href="/ui/files/${meta.id}">${escapeHtml(meta.display_name)}</a>`;
  await refresh();
}

// API は timestamp を ISO 文字列で返す場合と
// time::OffsetDateTime のシリアライズ形式 ([year, day_of_year, h, m, s, ns, ...]) で返す場合がある
function fmtTs(ts) {
  if (typeof ts === 'string') return ts.replace('T', ' ').slice(0, 19);
  if (Array.isArray(ts) && ts.length >= 5) {
    const [y, doy, h, m, s] = ts;
    const d = new Date(Date.UTC(y, 0, doy));
    const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(d.getUTCDate()).padStart(2, '0');
    const pad = n => String(n).padStart(2, '0');
    return `${y}-${mm}-${dd} ${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  return String(ts ?? '');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

$('logout').onclick = logout;
init();
</script>
</body>
</html>
