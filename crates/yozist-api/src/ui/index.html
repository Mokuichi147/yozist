<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yozist</title>
<script>
  // OS のダーク設定に追従 (Tailwind/daisyUI が DOM を見る前に data-theme を確定させる)
  document.documentElement.setAttribute(
    'data-theme',
    window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  );
</script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  /* CDN ロード完了前のフラッシュ防止 */
  .hidden { display: none !important; }
  /* row-compact: Tailwind 拡張に頼らず純 CSS で */
  .row-compact { padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-size: 0.875rem; }
  .row-compact:hover { background: rgba(127,127,127,0.12); }
</style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">

<div class="navbar bg-base-100 shadow-sm sticky top-0 z-30">
  <div class="flex-1 px-2">
    <span class="text-xl font-bold">yozist</span>
  </div>
  <div class="flex-none flex items-center gap-3 px-2">
    <span id="me" class="text-sm opacity-70">…</span>
    <button id="logout" class="btn btn-sm btn-ghost">ログアウト</button>
  </div>
</div>

<!-- ログインフォーム -->
<div id="login-form" class="hidden">
  <div class="card bg-base-100 shadow-md max-w-sm mx-auto mt-24">
    <div class="card-body">
      <h2 class="card-title text-sm uppercase tracking-wider opacity-70">ログイン</h2>
      <p class="text-sm opacity-70">未ログインです。アカウント名とパスワードを入力してください。</p>
      <input id="lf-user" class="input input-bordered w-full" placeholder="username">
      <input id="lf-pw" type="password" class="input input-bordered w-full" placeholder="password">
      <div class="card-actions mt-2 flex justify-between items-center">
        <button class="btn btn-primary btn-sm" onclick="doLogin()">ログイン</button>
        <button class="btn btn-sm btn-ghost btn-link" onclick="doRegister()">アカウント作成</button>
      </div>
    </div>
  </div>
</div>

<!-- メイン -->
<div id="main" class="hidden max-w-7xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-[240px_1fr] gap-4">

    <!-- 左カラム: tags / series -->
    <div class="space-y-4">
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold mb-2">tags</h2>
          <ul class="menu menu-sm p-0 max-h-[60vh] overflow-y-auto w-full" id="tag-list"></ul>
        </div>
      </div>
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold mb-2">series</h2>
          <ul class="menu menu-sm p-0 max-h-[60vh] overflow-y-auto w-full" id="series-list"></ul>
        </div>
      </div>
    </div>

    <!-- 右カラム: files / detail / groups / queries / shares / audit -->
    <div class="space-y-4">

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold mb-2">
            files <span class="opacity-60 normal-case" id="files-count"></span>
          </h2>

          <div class="join w-full mb-2">
            <input id="search-input" class="input input-bordered input-sm join-item w-full"
                   placeholder="全文検索 (FTS5)"
                   onkeydown="if(event.key==='Enter')doSearch()">
            <button class="btn btn-sm join-item" onclick="doSearch()">検索</button>
            <button class="btn btn-sm join-item btn-ghost" onclick="clearSearch()" title="クリア">×</button>
          </div>
          <div id="file-filter" class="text-xs opacity-60 mb-2"></div>

          <div class="border border-base-300 rounded-lg p-3 mb-3 space-y-2 bg-base-200/40">
            <input id="upload-name" class="input input-bordered input-sm w-full"
                   placeholder="新規ファイル名 (例: memo.md)">
            <textarea id="upload-content" class="textarea textarea-bordered w-full text-sm"
                      placeholder="本文 (省略可)" rows="3"></textarea>
            <div class="flex flex-wrap items-center gap-2">
              <input type="file" id="upload-file" class="file-input file-input-bordered file-input-xs flex-1 min-w-[160px]">
              <button class="btn btn-primary btn-sm" onclick="doUpload()">登録</button>
            </div>
          </div>

          <ul class="divide-y divide-base-300 max-h-[50vh] overflow-y-auto" id="file-list"></ul>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm hidden" id="file-detail">
        <div class="card-body p-4">
          <h2 id="fd-name" class="card-title text-base">…</h2>
          <div id="fd-meta" class="text-xs opacity-60 break-all"></div>
          <div id="fd-tags" class="my-2 flex flex-wrap gap-1"></div>

          <div class="join w-full">
            <input id="fd-add-tag" class="input input-bordered input-sm join-item w-full"
                   placeholder="タグ名を入力して追加">
            <button class="btn btn-sm join-item" onclick="addTagToCurrent()">+ タグ</button>
          </div>

          <div class="join w-full mt-2">
            <select id="fd-add-series" class="select select-bordered select-sm join-item w-full">
              <option value="">シリーズ選択…</option>
            </select>
            <button class="btn btn-sm join-item" onclick="addToSeries()">+ シリーズ</button>
          </div>

          <div class="flex flex-wrap gap-2 mt-3">
            <button class="btn btn-sm" onclick="issueShare()">共有URLを発行</button>
            <button class="btn btn-sm" onclick="grantPermission()">権限付与</button>
            <button class="btn btn-sm" onclick="toggleEdit()">編集</button>
            <button class="btn btn-sm btn-error btn-outline" onclick="deleteCurrentFile()">削除</button>
          </div>

          <div id="fd-share" class="text-xs break-all my-2"></div>

          <div id="fd-editor" class="hidden my-2 space-y-2">
            <textarea id="fd-edit-textarea"
                      class="textarea textarea-bordered w-full font-mono text-xs"
                      rows="12"></textarea>
            <div class="join w-full">
              <input id="fd-edit-message" class="input input-bordered input-sm join-item w-full"
                     placeholder="コミットメッセージ (任意)">
              <button class="btn btn-primary btn-sm join-item" onclick="saveEdit()">保存</button>
              <button class="btn btn-sm join-item" onclick="toggleEdit()">キャンセル</button>
            </div>
          </div>

          <div class="collapse collapse-arrow bg-base-200 mt-2">
            <input type="checkbox">
            <div class="collapse-title text-sm font-semibold py-2 min-h-0">content</div>
            <div class="collapse-content">
              <pre id="fd-content"
                   class="bg-base-300/50 p-3 rounded text-xs overflow-x-auto max-h-96 whitespace-pre-wrap break-words">…</pre>
            </div>
          </div>

          <div class="collapse collapse-arrow bg-base-200 mt-2">
            <input type="checkbox">
            <div class="collapse-title text-sm font-semibold py-2 min-h-0">history</div>
            <div class="collapse-content">
              <div id="fd-history" class="space-y-1">…</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">groups</h2>
            <button class="btn btn-xs" onclick="createGroup()">+ 新規</button>
          </div>
          <div id="group-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">saved queries</h2>
            <button class="btn btn-xs" onclick="createQuery()">+ 新規</button>
          </div>
          <div id="query-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">active shares</h2>
            <button class="btn btn-xs btn-ghost" onclick="loadShares()">refresh</button>
          </div>
          <div id="share-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">audit log</h2>
            <button class="btn btn-xs btn-ghost" onclick="loadAudit()">refresh</button>
          </div>
          <div id="audit-list" class="text-sm space-y-1">…</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let token = localStorage.getItem('yozist_token') || '';
let filterTags = []; // 選択中のタグ名（AND）
let searchQuery = '';

function api(path, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, token ? { Authorization: 'Bearer ' + token } : {});
  return fetch(path, opts);
}
function json(path, opts) {
  opts = opts || {};
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof ArrayBuffer)) {
    opts.body = JSON.stringify(opts.body);
    opts.headers = Object.assign({}, opts.headers, { 'content-type': 'application/json' });
  }
  return api(path, opts).then(r => r.ok ? r.json() : Promise.reject(r));
}

async function doLogin() {
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ username: $('lf-user').value, password: $('lf-pw').value }),
    });
    if (!r.ok) throw new Error('login failed');
    const d = await r.json();
    token = d.token;
    localStorage.setItem('yozist_token', token);
    init();
  } catch (e) { alert('ログイン失敗: ' + e); }
}
async function doRegister() {
  const u = $('lf-user').value, p = $('lf-pw').value;
  if (!u || !p) return alert('username / password を入力してください');
  const r = await fetch('/api/auth/register', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ username: u, password: p }),
  });
  if (!r.ok) return alert('登録失敗: ' + await r.text());
  alert('登録成功。続けてログインします。'); doLogin();
}
function logout() {
  localStorage.removeItem('yozist_token');
  token = '';
  filterTags = [];
  showLogin();
}

function showLogin() {
  $('login-form').classList.remove('hidden');
  $('main').classList.add('hidden');
}
function showMain() {
  $('login-form').classList.add('hidden');
  $('main').classList.remove('hidden');
}

async function init() {
  if (!token) { showLogin(); return; }
  try {
    const me = await json('/api/auth/me');
    if (me.anonymous) return logout();
    $('me').textContent = me.user.username;
    showMain();
    await refresh();
  } catch (e) { logout(); }
}

async function refresh() {
  await Promise.all([loadTags(), loadSeries(), loadFiles(), loadShares(), loadAudit(), loadQueries(), loadGroups()]);
}

async function loadGroups() {
  const el = $('group-list');
  try {
    const list = await json('/api/groups');
    const byId = Object.fromEntries(list.map(g => [g.id, g]));
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">グループなし</div>'; return; }
    el.innerHTML = list.map(g => {
      const parent = g.parent_id ? ` <span class="text-xs opacity-60">⊂ ${escapeHtml(byId[g.parent_id]?.name || '?')}</span>` : '';
      return `<div class="flex items-center justify-between row-compact">
        <div><span class="font-semibold">${escapeHtml(g.name)}</span>${parent}</div>
        <button class="btn btn-xs" onclick="manageGroupMembers('${g.id}','${escapeHtml(g.name)}')">メンバー</button>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function createGroup() {
  const name = prompt('グループ名');
  if (!name) return;
  const groups = await json('/api/groups');
  const parentPrompt = groups.length === 0
    ? null
    : prompt(`親グループ番号 (0=なし):\n0: (なし)\n` + groups.map((g, i) => `${i + 1}: ${g.name}`).join('\n'), '0');
  const parentIdx = parseInt(parentPrompt || '0', 10);
  const body = { name };
  if (parentIdx > 0 && parentIdx <= groups.length) {
    body.parent_id = groups[parentIdx - 1].id;
  }
  await json('/api/groups', { method: 'POST', body });
  await loadGroups();
}

async function manageGroupMembers(groupId, groupName) {
  const [members, users] = await Promise.all([
    json(`/api/groups/${groupId}/members`),
    json('/api/users'),
  ]);
  const usersById = Object.fromEntries(users.map(u => [u.id, u.username]));
  const memberNames = members.map(uid => usersById[uid] || uid.slice(0, 8)).join(', ') || '(なし)';
  const action = prompt(
    `グループ "${groupName}" メンバー:\n${memberNames}\n\n` +
    `1: ユーザー追加\n2: ユーザー除外\nそれ以外: キャンセル`,
    '1'
  );
  if (action === '1') {
    const list = users.map((u, i) => `${i + 1}: ${u.username}`).join('\n');
    const sel = prompt(`追加するユーザー番号:\n${list}`, '1');
    const idx = parseInt(sel || '0', 10) - 1;
    if (idx < 0 || idx >= users.length) return;
    await api(`/api/groups/${groupId}/members`, {
      method: 'POST',
      body: JSON.stringify({ user_id: users[idx].id }),
      headers: { 'content-type': 'application/json' },
    });
    alert('追加しました');
  } else if (action === '2') {
    if (members.length === 0) return alert('メンバーがいません');
    const list = members.map((uid, i) => `${i + 1}: ${usersById[uid] || uid.slice(0, 8)}`).join('\n');
    const sel = prompt(`除外するメンバー番号:\n${list}`, '1');
    const idx = parseInt(sel || '0', 10) - 1;
    if (idx < 0 || idx >= members.length) return;
    await api(`/api/groups/${groupId}/members/${members[idx]}`, { method: 'DELETE' });
    alert('除外しました');
  }
}

async function loadQueries() {
  const el = $('query-list');
  try {
    const list = await fetch('/api/queries').then(r => r.json());
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">保存クエリなし</div>'; return; }
    el.innerHTML = list.map(q => {
      const cond = [];
      if (q.query.tags_and && q.query.tags_and.length) cond.push('AND: ' + q.query.tags_and.join(','));
      if (q.query.tags_not && q.query.tags_not.length) cond.push('NOT: ' + q.query.tags_not.join(','));
      return `<div class="flex items-center justify-between row-compact">
        <div>
          <span class="font-semibold">${escapeHtml(q.name)}</span>
          <span class="text-xs opacity-60 ml-1">${cond.join(' / ') || '全件'}</span>
        </div>
        <div class="flex gap-1">
          <button class="btn btn-xs" onclick="shareQuery('${q.id}','${escapeHtml(q.name)}')">共有</button>
          <button class="btn btn-xs btn-error btn-outline" onclick="deleteQuery('${q.id}')">削除</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function createQuery() {
  const name = prompt('保存クエリ名');
  if (!name) return;
  const tagsAnd = prompt('AND タグ (カンマ区切り、空可)', '');
  const tagsNot = prompt('NOT タグ (カンマ区切り、空可)', '');
  const body = {
    name,
    tags_and: tagsAnd ? tagsAnd.split(',').map(s => s.trim()).filter(Boolean) : [],
    tags_not: tagsNot ? tagsNot.split(',').map(s => s.trim()).filter(Boolean) : [],
  };
  await json('/api/queries', { method: 'POST', body });
  await loadQueries();
}

async function deleteQuery(id) {
  if (!confirm('削除しますか？')) return;
  await api(`/api/queries/${id}`, { method: 'DELETE' });
  await loadQueries();
}

async function shareQuery(id, name) {
  const ttl = prompt(`"${name}" の共有URL TTL (秒)`, '3600');
  if (!ttl) return;
  const r = await json(`/api/queries/${id}/share`, {
    method: 'POST',
    body: { ttl_secs: parseInt(ttl, 10) },
  });
  const fullUrl = location.origin + r.url;
  prompt('クエリ共有URL (コピーしてください):', fullUrl);
  await loadShares();
}

async function grantPermission() {
  if (!currentFile) return;
  const users = await json('/api/users');
  if (users.length === 0) return alert('ユーザーが存在しません');
  const userListStr = users.map((u, i) => `${i + 1}: ${u.username}`).join('\n');
  const sel = prompt(`権限を付与するユーザー番号:\n${userListStr}`, '1');
  if (!sel) return;
  const idx = parseInt(sel, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= users.length) return alert('無効な選択');
  const target = users[idx];

  const maskStr = prompt(
    '権限マスク (VIEW=1 READ=2 WRITE=4 ADMIN=8 を合算):\nread=3, write=7, admin=15',
    '3'
  );
  if (!maskStr) return;
  const mask = parseInt(maskStr, 10);
  if (isNaN(mask)) return alert('無効なマスク');

  const allow = confirm('OK=allow / Cancel=deny');

  await json('/api/acl', {
    method: 'POST',
    body: {
      subject: `user:${target.id}`,
      target: `file:${currentFile.id}`,
      mask,
      allow,
      priority: 10,
    },
  });
  alert(`付与しました: ${target.username} に ${allow ? 'allow' : 'deny'} mask=${mask}`);
}

async function loadTags() {
  const tags = await fetch('/api/tags').then(r => r.json());
  const el = $('tag-list');
  el.innerHTML = '';
  if (tags.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs px-2 py-1">タグなし</div>'; return; }
  tags.forEach(t => {
    const li = document.createElement('li');
    const active = filterTags.includes(t.name);
    const icon = t.kind === 'system' ? '⚙' : t.kind === 'ai' ? '🤖' : '';
    const a = document.createElement('a');
    a.className = 'flex items-center justify-between gap-1 px-2 py-1 rounded ' +
      (active ? 'bg-primary/20 font-semibold' : 'hover:bg-base-200');
    a.innerHTML = `<span class="flex-1 truncate">${escapeHtml(t.name)} ${icon}</span>`;
    const renameBtn = document.createElement('button');
    renameBtn.className = 'btn btn-xs btn-ghost px-1';
    renameBtn.title = 'リネーム';
    renameBtn.textContent = '✎';
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-xs btn-ghost px-1 text-error';
    delBtn.title = '削除';
    delBtn.textContent = '×';
    a.append(renameBtn, delBtn);
    renameBtn.onclick = async (e) => {
      e.stopPropagation(); e.preventDefault();
      const name = prompt('新しいタグ名', t.name);
      if (!name || name === t.name) return;
      await api(`/api/tags/${t.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ name }),
        headers: { 'content-type': 'application/json' },
      });
      await refresh();
    };
    delBtn.onclick = async (e) => {
      e.stopPropagation(); e.preventDefault();
      if (!confirm(`タグ "${t.name}" を削除しますか？\n(ファイル本体は残りますが、このタグの紐付けは全て解除されます)`)) return;
      await api(`/api/tags/${t.id}`, { method: 'DELETE' });
      filterTags = filterTags.filter(x => x !== t.name);
      await refresh();
    };
    a.onclick = (e) => {
      if (e.target === renameBtn || e.target === delBtn) return;
      const idx = filterTags.indexOf(t.name);
      if (idx >= 0) filterTags.splice(idx, 1); else filterTags.push(t.name);
      refresh();
    };
    li.appendChild(a);
    el.appendChild(li);
  });
}

async function loadSeries() {
  const list = await fetch('/api/series').then(r => r.json());
  const el = $('series-list');
  el.innerHTML = '';
  if (list.length === 0) {
    el.innerHTML = '<div class="opacity-50 text-xs px-2 py-1">シリーズなし</div>';
  } else {
    list.forEach(s => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'flex items-center justify-between gap-1 px-2 py-1 rounded hover:bg-base-200';
      a.title = s.description || '';
      a.innerHTML = `<span class="flex-1 truncate">${escapeHtml(s.name)}</span>`;
      const renameBtn = document.createElement('button');
      renameBtn.className = 'btn btn-xs btn-ghost px-1';
      renameBtn.title = 'リネーム';
      renameBtn.textContent = '✎';
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-xs btn-ghost px-1 text-error';
      delBtn.title = '削除';
      delBtn.textContent = '×';
      a.append(renameBtn, delBtn);
      renameBtn.onclick = async (e) => {
        e.stopPropagation(); e.preventDefault();
        const name = prompt('新しいシリーズ名', s.name);
        if (!name) return;
        const description = prompt('説明 (空可)', s.description || '');
        await api(`/api/series/${s.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ name, description: description || null }),
          headers: { 'content-type': 'application/json' },
        });
        await refresh();
      };
      delBtn.onclick = async (e) => {
        e.stopPropagation(); e.preventDefault();
        if (!confirm(`シリーズ "${s.name}" を削除しますか？\n(ファイル本体は残ります)`)) return;
        await api(`/api/series/${s.id}`, { method: 'DELETE' });
        await refresh();
      };
      a.onclick = async (e) => {
        if (e.target === renameBtn || e.target === delBtn) return;
        const members = await fetch('/api/series/' + s.id + '/members').then(r => r.json());
        alert(`series "${s.name}"\nメンバー: ${members.length}件\n` + members.map(m =>
          `[${m.order_index}] ${m.file_id.slice(0,8)}…`).join('\n'));
      };
      li.appendChild(a);
      el.appendChild(li);
    });
  }
  // 「+ 新規シリーズ」リンク
  const add = document.createElement('li');
  const addLink = document.createElement('a');
  addLink.className = 'text-xs text-primary px-2 py-1';
  addLink.href = '#';
  addLink.textContent = '+ 新規シリーズ';
  addLink.onclick = async (e) => {
    e.preventDefault();
    const name = prompt('シリーズ名');
    if (!name) return;
    await json('/api/series', { method: 'POST', body: { name } });
    await refresh();
  };
  add.appendChild(addLink);
  el.appendChild(add);

  // file-detail の select 更新
  const sel = $('fd-add-series');
  if (sel) {
    sel.innerHTML = '<option value="">シリーズ選択…</option>' +
      list.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
  }
}

async function loadShares() {
  const el = $('share-list');
  try {
    const list = await json('/api/shares');
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">発行済み共有なし</div>'; return; }
    el.innerHTML = list.map(s => {
      const revoked = s.revoked_at ? ' <span class="badge badge-error badge-sm">失効</span>' : '';
      const fullJti = s.jti;
      return `<div class="flex items-center justify-between row-compact">
        <span><span class="badge badge-ghost badge-sm">${escapeHtml(s.kind)}</span>
          <span class="opacity-70">${s.target_id.slice(0,8)}…</span>${revoked}</span>
        ${!s.revoked_at ? `<button class="btn btn-xs btn-error btn-outline" onclick="revokeShare('${fullJti}')">失効</button>` : ''}
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function revokeShare(jti) {
  if (!confirm('失効しますか？')) return;
  const r = await api(`/api/shares/${jti}`, { method: 'DELETE' });
  if (!r.ok) return alert('失効失敗');
  await loadShares();
}

async function loadAudit() {
  const el = $('audit-list');
  try {
    const list = await json('/api/audit?limit=15');
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-xs">監査記録なし</div>'; return; }
    el.innerHTML = list.map(a => {
      const ok = a.result.startsWith('ok');
      const status = ok
        ? '<span class="text-success">✓</span>'
        : '<span class="text-error">✗</span>';
      const time = a.timestamp.replace('T',' ').slice(0,19);
      return `<div class="row-compact text-xs">
        ${status} <span class="opacity-70">${time}</span>
        <span class="font-semibold">${escapeHtml(a.actor_label || '-')}</span>
        ${escapeHtml(a.action)} ${escapeHtml(a.target_type || '')}
        ${a.target_ref ? '<span class="opacity-60">'+a.target_ref.slice(0,8)+'…</span>' : ''}
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

async function loadFiles() {
  let url = '/api/files';
  if (searchQuery) {
    url = '/api/search?q=' + encodeURIComponent(searchQuery);
  } else if (filterTags.length > 0) {
    url = '/api/files/by-tags?tags=' + encodeURIComponent(filterTags.join(','));
  }
  const files = await fetch(url).then(r => r.json());
  $('files-count').textContent = `(${files.length})`;
  const filterParts = [];
  if (searchQuery) filterParts.push(`検索: "${searchQuery}"`);
  if (filterTags.length) filterParts.push('タグ: ' + filterTags.join(' AND '));
  $('file-filter').textContent = filterParts.join(' / ');
  const el = $('file-list');
  el.innerHTML = '';
  files.forEach(f => {
    const li = document.createElement('li');
    li.className = 'px-2 py-2 rounded hover:bg-base-200 cursor-pointer flex items-center justify-between gap-2';
    li.innerHTML = `<span class="font-semibold truncate">${escapeHtml(f.display_name)}</span>
      <span class="text-xs opacity-60 shrink-0">${f.size}B</span>`;
    li.onclick = () => showFile(f);
    el.appendChild(li);
  });
}

let currentFile = null;
let currentContent = '';

async function showFile(f) {
  currentFile = f;
  $('file-detail').classList.remove('hidden');
  $('fd-name').textContent = f.display_name;
  $('fd-meta').textContent = `id=${f.id}, size=${f.size}B, current_commit=${f.current_commit}`;
  $('fd-share').textContent = '';
  $('fd-editor').classList.add('hidden');
  const [tags, content, history] = await Promise.all([
    json(`/api/files/${f.id}/tags`),
    api(`/api/files/${f.id}/content`).then(r => r.text()),
    json(`/api/files/${f.id}/history`),
  ]);
  currentContent = content;
  $('fd-tags').innerHTML = tags.length === 0
    ? '<span class="opacity-50 text-xs">タグなし</span>'
    : tags.map(t => {
        const variant = t.kind === 'system' ? 'badge-neutral'
                      : t.kind === 'ai' ? 'badge-warning'
                      : 'badge-primary';
        return `<span class="badge ${variant} badge-outline gap-1">
          ${escapeHtml(t.name)}
          <a href="#" class="text-error" onclick="event.preventDefault(); detachTagFromCurrent('${t.id}')">×</a>
        </span>`;
      }).join('');
  $('fd-content').textContent = content.length > 5000 ? content.slice(0, 5000) + '\n…' : content;
  const currentCommitId = f.current_commit;
  $('fd-history').innerHTML = history.length === 0
    ? '<div class="opacity-50 text-xs">履歴なし</div>'
    : history.map(c => {
        const isCurrent = c.id === currentCommitId;
        const time = c.timestamp.replace('T', ' ').slice(0, 19);
        return `<div class="row-compact flex items-center justify-between gap-2 text-xs">
          <div class="truncate">
            ${isCurrent ? '<span class="text-warning font-bold">★</span> ' : ''}
            <span class="opacity-70">${time}</span>
            <span class="opacity-60">${escapeHtml(c.format_id)}</span>
            ${escapeHtml(c.message || '')}
          </div>
          <div class="flex gap-1 shrink-0">
            <button class="btn btn-xs" onclick="diffCommit('${c.id}','${time}')">Δ</button>
            <button class="btn btn-xs" onclick="previewCommit('${c.id}')">表示</button>
            ${isCurrent ? '' : `<button class="btn btn-xs btn-warning btn-outline"
              onclick="rollbackToCommit('${c.id}','${time}')">戻す</button>`}
          </div>
        </div>`;
      }).join('');
}

async function diffCommit(commitId, time) {
  if (!currentFile) return;
  const [oldR, newR] = await Promise.all([
    api(`/api/files/${currentFile.id}/commits/${commitId}`),
    api(`/api/files/${currentFile.id}/content`),
  ]);
  if (!oldR.ok || !newR.ok) return alert('diff取得失敗');
  const oldText = await oldR.text();
  const newText = await newR.text();
  const oldLines = oldText.split('\n');
  const newLines = newText.split('\n');
  const max = Math.max(oldLines.length, newLines.length);
  let out = `=== diff ===\n旧 (${time}) → 現在\n\n`;
  const oldSet = new Set(oldLines);
  const newSet = new Set(newLines);
  for (let i = 0; i < max; i++) {
    const a = oldLines[i] ?? '';
    const b = newLines[i] ?? '';
    if (a === b) out += `  ${a}\n`;
    else {
      if (a && !newSet.has(a)) out += `- ${a}\n`;
      if (b && !oldSet.has(b)) out += `+ ${b}\n`;
      if (a && newSet.has(a) && b && oldSet.has(b)) out += `~ ${a} → ${b}\n`;
    }
  }
  alert(out.length > 3000 ? out.slice(0, 3000) + '\n…' : out);
}

async function previewCommit(commitId) {
  if (!currentFile) return;
  const r = await api(`/api/files/${currentFile.id}/commits/${commitId}`);
  if (!r.ok) return alert('取得失敗');
  const text = await r.text();
  alert(`commit ${commitId.slice(0, 8)}…\n\n${text.length > 1500 ? text.slice(0, 1500) + '…' : text}`);
}

async function rollbackToCommit(commitId, time) {
  if (!currentFile) return;
  if (!confirm(`"${currentFile.display_name}" を ${time} の時点に戻しますか？\n(履歴は破壊されず、新しいコミットとして記録されます)`)) return;
  const r = await api(
    `/api/files/${currentFile.id}/rollback/${commitId}?message=` +
      encodeURIComponent(`rollback to ${time}`),
    { method: 'POST' }
  );
  if (!r.ok) return alert('rollback失敗: ' + await r.text());
  await showFile(currentFile);
  await loadFiles();
}

async function doUpload() {
  const fileInput = $('upload-file');
  let name = $('upload-name').value.trim();
  let body;
  if (fileInput.files.length > 0) {
    const f = fileInput.files[0];
    if (!name) name = f.name;
    body = await f.arrayBuffer();
  } else {
    if (!name) return alert('ファイル名 or アップロードファイルを指定してください');
    body = new TextEncoder().encode($('upload-content').value || '').buffer;
  }
  const r = await api('/api/files?name=' + encodeURIComponent(name), {
    method: 'POST',
    body,
    headers: { 'content-type': 'application/octet-stream' },
  });
  if (!r.ok) return alert('登録失敗: ' + await r.text());
  $('upload-name').value = '';
  $('upload-content').value = '';
  fileInput.value = '';
  await refresh();
}

function toggleEdit() {
  const ed = $('fd-editor');
  if (ed.classList.contains('hidden')) {
    $('fd-edit-textarea').value = currentContent;
    $('fd-edit-message').value = '';
    ed.classList.remove('hidden');
  } else {
    ed.classList.add('hidden');
  }
}

async function saveEdit() {
  if (!currentFile) return;
  const newContent = $('fd-edit-textarea').value;
  const msg = $('fd-edit-message').value;
  const url = `/api/files/${currentFile.id}/content` + (msg ? `?message=${encodeURIComponent(msg)}` : '');
  const r = await api(url, {
    method: 'POST',
    body: new TextEncoder().encode(newContent).buffer,
    headers: { 'content-type': 'application/octet-stream' },
  });
  if (!r.ok) return alert('保存失敗: ' + await r.text());
  await showFile(currentFile);
  await refresh();
}

async function addTagToCurrent() {
  if (!currentFile) return;
  const name = $('fd-add-tag').value.trim();
  if (!name) return;
  const created = await json('/api/tags', { method: 'POST', body: { name } });
  const r = await api(`/api/files/${currentFile.id}/tags`, {
    method: 'POST', body: JSON.stringify({ tag_id: created.id }),
    headers: { 'content-type': 'application/json' },
  });
  if (!r.ok) return alert('タグ追加失敗: ' + await r.text());
  $('fd-add-tag').value = '';
  await showFile(currentFile);
  await loadTags();
}

async function detachTagFromCurrent(tagId) {
  if (!currentFile) return;
  const r = await api(`/api/files/${currentFile.id}/tags/${tagId}`, { method: 'DELETE' });
  if (!r.ok) return alert('タグ取り外し失敗');
  await showFile(currentFile);
  await loadTags();
}

async function addToSeries() {
  if (!currentFile) return;
  const sid = $('fd-add-series').value;
  if (!sid) return alert('シリーズを選択してください');
  await json(`/api/series/${sid}/members`, {
    method: 'POST',
    body: { file_id: currentFile.id },
  });
  alert('追加しました');
}

function doSearch() {
  searchQuery = $('search-input').value.trim();
  loadFiles();
}
function clearSearch() {
  searchQuery = '';
  $('search-input').value = '';
  loadFiles();
}

async function deleteCurrentFile() {
  if (!currentFile) return;
  if (!confirm(`"${currentFile.display_name}" を削除しますか？`)) return;
  const r = await api(`/api/files/${currentFile.id}`, { method: 'DELETE' });
  if (!r.ok) return alert('削除失敗: ' + await r.text());
  $('file-detail').classList.add('hidden');
  currentFile = null;
  await refresh();
}

async function issueShare() {
  if (!currentFile) return;
  const ttl = prompt('有効秒数を入力してください', '3600');
  if (!ttl) return;
  const r = await json(`/api/files/${currentFile.id}/share`, {
    method: 'POST',
    body: { ttl_secs: parseInt(ttl, 10) },
  });
  const fullUrl = location.origin + r.url;
  $('fd-share').innerHTML = `共有URL (${ttl}秒): <a class="link link-primary" href="${fullUrl}" target="_blank">${fullUrl}</a>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

$('logout').onclick = logout;
init();
</script>
