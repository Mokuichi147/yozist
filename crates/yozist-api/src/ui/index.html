<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>yozist</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
    margin: 0; padding: 20px; max-width: 1100px; margin: 0 auto;
    background: var(--bg, #fafafa); color: var(--fg, #222);
  }
  @media (prefers-color-scheme: dark) {
    body { --bg: #1a1a1a; --fg: #eee; }
    .card { background: #242424; border-color: #333; }
    .row:hover { background: #2c2c2c; }
    input, button { background: #2a2a2a; color: #eee; border-color: #444; }
  }
  header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 20px; }
  h1 { font-size: 22px; margin: 0; }
  .me { font-size: 13px; opacity: 0.7; }
  .grid { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
  .card {
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    padding: 12px; margin-bottom: 14px;
  }
  .card h2 { font-size: 13px; text-transform: uppercase; margin: 0 0 8px;
             color: #888; letter-spacing: 0.05em; }
  ul.list { list-style: none; margin: 0; padding: 0; max-height: 70vh; overflow-y: auto; }
  ul.list li {
    padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  ul.list li:hover { background: rgba(0,123,255,0.1); }
  ul.list li.active { background: rgba(0,123,255,0.2); font-weight: 600; }
  .row { padding: 6px 8px; border-radius: 4px; }
  .row:hover { background: #f0f0f0; }
  .tag-chip {
    display: inline-block; padding: 2px 8px; margin: 2px;
    border-radius: 10px; background: rgba(0,123,255,0.15); font-size: 12px;
  }
  .tag-chip.system { background: rgba(128,128,128,0.2); }
  .tag-chip.ai { background: rgba(255,140,0,0.2); }
  pre {
    background: rgba(127,127,127,0.1); padding: 10px; border-radius: 4px;
    overflow-x: auto; font-size: 12px; max-height: 400px;
  }
  input, button {
    font-size: 13px; padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc;
    background: #fff; color: inherit;
  }
  button { cursor: pointer; }
  button.primary { background: #0070f3; color: white; border-color: #0070f3; }
  .login { max-width: 320px; margin: 100px auto; }
  .empty { color: #999; font-size: 13px; padding: 8px; }
  .small { font-size: 11px; color: #888; }
  details summary { cursor: pointer; padding: 4px 0; font-weight: 600; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>yozist</h1>
  <div class="me" id="me">…</div>
  <div style="margin-left:auto"><button id="logout">logout</button></div>
</header>

<div id="login-form" class="card login" style="display:none">
  <h2>login</h2>
  <p style="font-size:13px">未ログインです。アカウント名とパスワードを入力してください。</p>
  <input id="lf-user" placeholder="username" style="width:100%; margin-bottom:8px"><br>
  <input id="lf-pw" type="password" placeholder="password" style="width:100%; margin-bottom:8px"><br>
  <button class="primary" onclick="doLogin()">login</button>
  <button onclick="doRegister()">register</button>
</div>

<div id="main" style="display:none">
<div class="grid">
  <div>
    <div class="card">
      <h2>tags</h2>
      <ul class="list" id="tag-list"></ul>
    </div>
    <div class="card">
      <h2>series</h2>
      <ul class="list" id="series-list"></ul>
    </div>
  </div>
  <div>
    <div class="card">
      <h2>files <span class="small" id="files-count"></span></h2>
      <div style="display:flex; gap:6px; margin-bottom:8px">
        <input id="search-input" placeholder="全文検索 (FTS5)" style="flex:1" onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">検索</button>
        <button onclick="clearSearch()" class="small">×</button>
      </div>
      <div id="file-filter" class="small" style="margin-bottom:8px"></div>
      <div style="margin-bottom:8px; display:flex; gap:8px; align-items:center">
        <input id="upload-name" placeholder="新規ファイル名 (例: memo.md)" style="flex:1">
        <textarea id="upload-content" placeholder="本文 (省略可)" style="width:100%; min-height:60px; flex-basis:100%"></textarea>
        <input type="file" id="upload-file" style="font-size:11px">
        <button class="primary" onclick="doUpload()">登録</button>
      </div>
      <ul class="list" id="file-list"></ul>
    </div>
    <div class="card" id="file-detail" style="display:none">
      <h2 id="fd-name">…</h2>
      <div id="fd-meta" class="small"></div>
      <div id="fd-tags" style="margin: 8px 0"></div>
      <div style="display:flex; gap:6px; margin:6px 0">
        <input id="fd-add-tag" placeholder="タグ名を入力して追加" style="flex:1">
        <button onclick="addTagToCurrent()">+ タグ</button>
      </div>
      <div style="display:flex; gap:6px; margin:6px 0">
        <select id="fd-add-series" style="flex:1"><option value="">シリーズ選択…</option></select>
        <button onclick="addToSeries()">+ シリーズ</button>
      </div>
      <div style="display:flex; gap:6px; margin: 6px 0">
        <button onclick="issueShare()">共有URLを発行</button>
        <button onclick="grantPermission()">権限付与</button>
        <button onclick="toggleEdit()">編集</button>
        <button style="color:#c00; border-color:#c00" onclick="deleteCurrentFile()">削除</button>
      </div>
      <div id="fd-share" class="small" style="word-break:break-all; margin:6px 0"></div>
      <div id="fd-editor" style="display:none; margin:6px 0">
        <textarea id="fd-edit-textarea" style="width:100%; min-height:200px; font-family:monospace; font-size:12px"></textarea>
        <div style="display:flex; gap:6px; margin-top:6px">
          <input id="fd-edit-message" placeholder="コミットメッセージ (任意)" style="flex:1">
          <button class="primary" onclick="saveEdit()">保存</button>
          <button onclick="toggleEdit()">キャンセル</button>
        </div>
      </div>
      <details><summary>content</summary><pre id="fd-content">…</pre></details>
      <details><summary>history</summary><div id="fd-history">…</div></details>
    </div>
    <div class="card">
      <h2>groups <button onclick="createGroup()" style="float:right; font-size:11px">+ 新規</button></h2>
      <div id="group-list" class="small">…</div>
    </div>
    <div class="card">
      <h2>saved queries <button onclick="createQuery()" style="float:right; font-size:11px">+ 新規</button></h2>
      <div id="query-list" class="small">…</div>
    </div>
    <div class="card">
      <h2>active shares <button onclick="loadShares()" style="float:right; font-size:11px">refresh</button></h2>
      <div id="share-list" class="small">…</div>
    </div>
    <div class="card">
      <h2>audit log <button onclick="loadAudit()" style="float:right; font-size:11px">refresh</button></h2>
      <div id="audit-list" class="small">…</div>
    </div>
  </div>
</div>
</div>

<script>
const $ = id => document.getElementById(id);
let token = localStorage.getItem('yozist_token') || '';
let filterTags = []; // 選択中のタグ名（AND）
let searchQuery = '';

function api(path, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, token ? { Authorization: 'Bearer ' + token } : {});
  return fetch(path, opts);
}
function json(path, opts) {
  opts = opts || {};
  if (opts.body && typeof opts.body === 'object') {
    opts.body = JSON.stringify(opts.body);
    opts.headers = Object.assign({}, opts.headers, { 'content-type': 'application/json' });
  }
  return api(path, opts).then(r => r.ok ? r.json() : Promise.reject(r));
}

async function doLogin() {
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ username: $('lf-user').value, password: $('lf-pw').value }),
    });
    if (!r.ok) throw new Error('login failed');
    const d = await r.json();
    token = d.token;
    localStorage.setItem('yozist_token', token);
    init();
  } catch (e) { alert('ログイン失敗: ' + e); }
}
async function doRegister() {
  const u = $('lf-user').value, p = $('lf-pw').value;
  if (!u || !p) return alert('username / password を入力してください');
  const r = await fetch('/api/auth/register', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ username: u, password: p }),
  });
  if (!r.ok) return alert('登録失敗: ' + await r.text());
  alert('登録成功。続けてログインします。'); doLogin();
}
function logout() {
  localStorage.removeItem('yozist_token');
  token = '';
  filterTags = [];
  showLogin();
}

function showLogin() { $('login-form').style.display = 'block'; $('main').style.display = 'none'; }
function showMain() { $('login-form').style.display = 'none'; $('main').style.display = 'block'; }

async function init() {
  if (!token) { showLogin(); return; }
  try {
    const me = await json('/api/auth/me');
    if (me.anonymous) return logout();
    $('me').textContent = me.user.username;
    showMain();
    await refresh();
  } catch (e) { logout(); }
}

async function refresh() {
  await Promise.all([loadTags(), loadSeries(), loadFiles(), loadShares(), loadAudit(), loadQueries(), loadGroups()]);
}

async function loadGroups() {
  const el = $('group-list');
  try {
    const list = await json('/api/groups');
    const byId = Object.fromEntries(list.map(g => [g.id, g]));
    if (list.length === 0) { el.innerHTML = '<div class="empty">グループなし</div>'; return; }
    el.innerHTML = list.map(g => {
      const parent = g.parent_id ? ` <span class="small">⊂ ${escape(byId[g.parent_id]?.name || '?')}</span>` : '';
      return `<div class="row">
        <strong>${escape(g.name)}</strong>${parent}
        <button style="float:right;font-size:10px;margin-left:4px" onclick="manageGroupMembers('${g.id}','${escape(g.name)}')">メンバー</button>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="empty">取得失敗</div>'; }
}

async function createGroup() {
  const name = prompt('グループ名');
  if (!name) return;
  const groups = await json('/api/groups');
  const parentPrompt = groups.length === 0
    ? null
    : prompt(`親グループ番号 (0=なし):\n0: (なし)\n` + groups.map((g, i) => `${i + 1}: ${g.name}`).join('\n'), '0');
  const parentIdx = parseInt(parentPrompt || '0', 10);
  const body = { name };
  if (parentIdx > 0 && parentIdx <= groups.length) {
    body.parent_id = groups[parentIdx - 1].id;
  }
  await json('/api/groups', { method: 'POST', body });
  await loadGroups();
}

async function manageGroupMembers(groupId, groupName) {
  const [members, users] = await Promise.all([
    json(`/api/groups/${groupId}/members`),
    json('/api/users'),
  ]);
  const usersById = Object.fromEntries(users.map(u => [u.id, u.username]));
  const memberNames = members.map(uid => usersById[uid] || uid.slice(0, 8)).join(', ') || '(なし)';
  const action = prompt(
    `グループ "${groupName}" メンバー:\n${memberNames}\n\n` +
    `1: ユーザー追加\n2: ユーザー除外\nそれ以外: キャンセル`,
    '1'
  );
  if (action === '1') {
    const list = users.map((u, i) => `${i + 1}: ${u.username}`).join('\n');
    const sel = prompt(`追加するユーザー番号:\n${list}`, '1');
    const idx = parseInt(sel || '0', 10) - 1;
    if (idx < 0 || idx >= users.length) return;
    await api(`/api/groups/${groupId}/members`, {
      method: 'POST',
      body: JSON.stringify({ user_id: users[idx].id }),
      headers: { 'content-type': 'application/json' },
    });
    alert('追加しました');
  } else if (action === '2') {
    if (members.length === 0) return alert('メンバーがいません');
    const list = members.map((uid, i) => `${i + 1}: ${usersById[uid] || uid.slice(0, 8)}`).join('\n');
    const sel = prompt(`除外するメンバー番号:\n${list}`, '1');
    const idx = parseInt(sel || '0', 10) - 1;
    if (idx < 0 || idx >= members.length) return;
    await api(`/api/groups/${groupId}/members/${members[idx]}`, { method: 'DELETE' });
    alert('除外しました');
  }
}

async function loadQueries() {
  const el = $('query-list');
  try {
    const list = await fetch('/api/queries').then(r => r.json());
    if (list.length === 0) { el.innerHTML = '<div class="empty">保存クエリなし</div>'; return; }
    el.innerHTML = list.map(q => {
      const cond = [];
      if (q.query.tags_and && q.query.tags_and.length) cond.push('AND: ' + q.query.tags_and.join(','));
      if (q.query.tags_not && q.query.tags_not.length) cond.push('NOT: ' + q.query.tags_not.join(','));
      return `<div class="row">
        <strong>${escape(q.name)}</strong> <span class="small">${cond.join(' / ') || '全件'}</span>
        <button style="float:right;font-size:10px;margin-left:4px" onclick="deleteQuery('${q.id}')">削除</button>
        <button style="float:right;font-size:10px;margin-left:4px" onclick="shareQuery('${q.id}','${escape(q.name)}')">共有</button>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="empty">取得失敗</div>'; }
}

async function createQuery() {
  const name = prompt('保存クエリ名');
  if (!name) return;
  const tagsAnd = prompt('AND タグ (カンマ区切り、空可)', '');
  const tagsNot = prompt('NOT タグ (カンマ区切り、空可)', '');
  const body = {
    name,
    tags_and: tagsAnd ? tagsAnd.split(',').map(s => s.trim()).filter(Boolean) : [],
    tags_not: tagsNot ? tagsNot.split(',').map(s => s.trim()).filter(Boolean) : [],
  };
  await json('/api/queries', { method: 'POST', body });
  await loadQueries();
}

async function deleteQuery(id) {
  if (!confirm('削除しますか？')) return;
  await api(`/api/queries/${id}`, { method: 'DELETE' });
  await loadQueries();
}

async function shareQuery(id, name) {
  const ttl = prompt(`"${name}" の共有URL TTL (秒)`, '3600');
  if (!ttl) return;
  const r = await json(`/api/queries/${id}/share`, {
    method: 'POST',
    body: { ttl_secs: parseInt(ttl, 10) },
  });
  const fullUrl = location.origin + r.url;
  prompt('クエリ共有URL (コピーしてください):', fullUrl);
  await loadShares();
}

async function grantPermission() {
  if (!currentFile) return;
  const users = await json('/api/users');
  if (users.length === 0) return alert('ユーザーが存在しません');
  const userListStr = users.map((u, i) => `${i + 1}: ${u.username}`).join('\n');
  const sel = prompt(`権限を付与するユーザー番号:\n${userListStr}`, '1');
  if (!sel) return;
  const idx = parseInt(sel, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= users.length) return alert('無効な選択');
  const target = users[idx];

  const maskStr = prompt(
    '権限マスク (VIEW=1 READ=2 WRITE=4 ADMIN=8 を合算):\nread=3, write=7, admin=15',
    '3'
  );
  if (!maskStr) return;
  const mask = parseInt(maskStr, 10);
  if (isNaN(mask)) return alert('無効なマスク');

  const allow = confirm('OK=allow / Cancel=deny');

  await json('/api/acl', {
    method: 'POST',
    body: {
      subject: `user:${target.id}`,
      target: `file:${currentFile.id}`,
      mask,
      allow,
      priority: 10,
    },
  });
  alert(`付与しました: ${target.username} に ${allow ? 'allow' : 'deny'} mask=${mask}`);
}

async function loadTags() {
  const tags = await fetch('/api/tags').then(r => r.json());
  const el = $('tag-list');
  el.innerHTML = '';
  if (tags.length === 0) { el.innerHTML = '<div class="empty">タグなし</div>'; return; }
  tags.forEach(t => {
    const li = document.createElement('li');
    li.className = filterTags.includes(t.name) ? 'active' : '';
    const icon = t.kind === 'system' ? '⚙' : t.kind === 'ai' ? '🤖' : '';
    li.innerHTML = `<span style="flex:1">${escape(t.name)} ${icon}</span>` +
      `<a href="#" style="margin-left:4px; color:#888" title="リネーム">✎</a>` +
      `<a href="#" style="margin-left:4px; color:#c00" title="削除">×</a>`;
    li.style.display = 'flex';
    li.style.alignItems = 'center';
    const [_, renameLink, deleteLink] = li.querySelectorAll('span, a, a');
    const links = li.querySelectorAll('a');
    links[0].onclick = async (e) => {
      e.stopPropagation(); e.preventDefault();
      const name = prompt('新しいタグ名', t.name);
      if (!name || name === t.name) return;
      await api(`/api/tags/${t.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ name }),
        headers: { 'content-type': 'application/json' },
      });
      await refresh();
    };
    links[1].onclick = async (e) => {
      e.stopPropagation(); e.preventDefault();
      if (!confirm(`タグ "${t.name}" を削除しますか？\n(ファイル本体は残りますが、このタグの紐付けは全て解除されます)`)) return;
      await api(`/api/tags/${t.id}`, { method: 'DELETE' });
      filterTags = filterTags.filter(x => x !== t.name);
      await refresh();
    };
    li.onclick = () => {
      const idx = filterTags.indexOf(t.name);
      if (idx >= 0) filterTags.splice(idx, 1); else filterTags.push(t.name);
      refresh();
    };
    el.appendChild(li);
  });
}

async function loadSeries() {
  const list = await fetch('/api/series').then(r => r.json());
  const el = $('series-list');
  el.innerHTML = '';
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">シリーズなし</div>';
  } else {
    list.forEach(s => {
      const li = document.createElement('li');
      li.style.display = 'flex';
      li.style.alignItems = 'center';
      li.innerHTML = `<span style="flex:1">${escape(s.name)}</span>` +
        `<a href="#" style="margin-left:4px; color:#888" title="リネーム">✎</a>` +
        `<a href="#" style="margin-left:4px; color:#c00" title="削除">×</a>`;
      li.title = s.description || '';
      const links = li.querySelectorAll('a');
      links[0].onclick = async (e) => {
        e.stopPropagation(); e.preventDefault();
        const name = prompt('新しいシリーズ名', s.name);
        if (!name) return;
        const description = prompt('説明 (空可)', s.description || '');
        await api(`/api/series/${s.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ name, description: description || null }),
          headers: { 'content-type': 'application/json' },
        });
        await refresh();
      };
      links[1].onclick = async (e) => {
        e.stopPropagation(); e.preventDefault();
        if (!confirm(`シリーズ "${s.name}" を削除しますか？\n(ファイル本体は残ります)`)) return;
        await api(`/api/series/${s.id}`, { method: 'DELETE' });
        await refresh();
      };
      li.onclick = async () => {
        const members = await fetch('/api/series/' + s.id + '/members').then(r => r.json());
        alert(`series "${s.name}"\nメンバー: ${members.length}件\n` + members.map(m =>
          `[${m.order_index}] ${m.file_id.slice(0,8)}…`).join('\n'));
      };
      el.appendChild(li);
    });
  }
  // 「+ 新規シリーズ」ボタンを末尾に追加
  const add = document.createElement('li');
  add.style.fontSize = '11px';
  add.innerHTML = '<a href="#" style="color:#0070f3">+ 新規シリーズ</a>';
  add.onclick = async (e) => {
    e.preventDefault();
    const name = prompt('シリーズ名');
    if (!name) return;
    await json('/api/series', { method: 'POST', body: { name } });
    await refresh();
  };
  el.appendChild(add);

  // file-detail の select 更新
  const sel = $('fd-add-series');
  if (sel) {
    sel.innerHTML = '<option value="">シリーズ選択…</option>' +
      list.map(s => `<option value="${s.id}">${escape(s.name)}</option>`).join('');
  }
}

async function loadShares() {
  const el = $('share-list');
  try {
    const list = await json('/api/shares');
    if (list.length === 0) { el.innerHTML = '<div class="empty">発行済み共有なし</div>'; return; }
    el.innerHTML = list.map(s => {
      const revoked = s.revoked_at ? ' <span style="color:#c00">[失効]</span>' : '';
      const fullJti = s.jti;
      return `<div class="row">
        ${s.kind} / ${s.target_id.slice(0,8)}…
        ${revoked}
        ${!s.revoked_at ? `<button style="float:right;font-size:10px" onclick="revokeShare('${fullJti}')">失効</button>` : ''}
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="empty">取得失敗</div>'; }
}

async function revokeShare(jti) {
  if (!confirm('失効しますか？')) return;
  const r = await api(`/api/shares/${jti}`, { method: 'DELETE' });
  if (!r.ok) return alert('失効失敗');
  await loadShares();
}

async function loadAudit() {
  const el = $('audit-list');
  try {
    const list = await json('/api/audit?limit=15');
    if (list.length === 0) { el.innerHTML = '<div class="empty">監査記録なし</div>'; return; }
    el.innerHTML = list.map(a => {
      const status = a.result.startsWith('ok') ? '✓' : '✗';
      const time = a.timestamp.replace('T',' ').slice(0,19);
      return `<div class="row">${status} ${time} ${a.actor_label || '-'} ${a.action} ${a.target_type || ''} ${a.target_ref ? a.target_ref.slice(0,8)+'…' : ''}</div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="empty">取得失敗</div>'; }
}

async function loadFiles() {
  let url = '/api/files';
  if (searchQuery) {
    url = '/api/search?q=' + encodeURIComponent(searchQuery);
  } else if (filterTags.length > 0) {
    url = '/api/files/by-tags?tags=' + encodeURIComponent(filterTags.join(','));
  }
  const files = await fetch(url).then(r => r.json());
  $('files-count').textContent = `(${files.length})`;
  const filterParts = [];
  if (searchQuery) filterParts.push(`検索: "${searchQuery}"`);
  if (filterTags.length) filterParts.push('タグ: ' + filterTags.join(' AND '));
  $('file-filter').textContent = filterParts.join(' / ');
  const el = $('file-list');
  el.innerHTML = '';
  files.forEach(f => {
    const li = document.createElement('li');
    li.className = 'row';
    li.innerHTML = `<strong>${escape(f.display_name)}</strong> <span class="small">${f.size}B</span>`;
    li.onclick = () => showFile(f);
    el.appendChild(li);
  });
}

let currentFile = null;
let currentContent = '';

async function showFile(f) {
  currentFile = f;
  $('file-detail').style.display = 'block';
  $('fd-name').textContent = f.display_name;
  $('fd-meta').textContent = `id=${f.id}, size=${f.size}B, current_commit=${f.current_commit}`;
  $('fd-share').textContent = '';
  $('fd-editor').style.display = 'none';
  const [tags, content, history] = await Promise.all([
    json(`/api/files/${f.id}/tags`),
    api(`/api/files/${f.id}/content`).then(r => r.text()),
    json(`/api/files/${f.id}/history`),
  ]);
  currentContent = content;
  $('fd-tags').innerHTML = tags.map(t =>
    `<span class="tag-chip ${t.kind}">${escape(t.name)}
      <a href="#" style="color:#c00; margin-left:4px" onclick="event.preventDefault(); detachTagFromCurrent('${t.id}')">×</a>
    </span>`
  ).join('') || '<span class="small empty">タグなし</span>';
  $('fd-content').textContent = content.length > 5000 ? content.slice(0, 5000) + '\n…' : content;
  const currentCommitId = f.current_commit;
  $('fd-history').innerHTML = history.length === 0
    ? '<div class="empty">履歴なし</div>'
    : history.map(c => {
        const isCurrent = c.id === currentCommitId;
        const time = c.timestamp.replace('T', ' ').slice(0, 19);
        return `<div class="row" style="font-size:11px">
          ${isCurrent ? '<strong>★</strong> ' : ''}
          ${time} ${c.format_id} ${escape(c.message || '')}
          <button style="float:right;font-size:10px;margin-left:4px"
            onclick="diffCommit('${c.id}','${time}')">Δ</button>
          <button style="float:right;font-size:10px;margin-left:4px"
            onclick="previewCommit('${c.id}')">表示</button>
          ${isCurrent ? '' : `<button style="float:right;font-size:10px;margin-left:4px"
            onclick="rollbackToCommit('${c.id}','${time}')">戻す</button>`}
        </div>`;
      }).join('');
}

async function diffCommit(commitId, time) {
  if (!currentFile) return;
  const [oldR, newR] = await Promise.all([
    api(`/api/files/${currentFile.id}/commits/${commitId}`),
    api(`/api/files/${currentFile.id}/content`),
  ]);
  if (!oldR.ok || !newR.ok) return alert('diff取得失敗');
  const oldText = await oldR.text();
  const newText = await newR.text();
  // 簡易行diff
  const oldLines = oldText.split('\n');
  const newLines = newText.split('\n');
  const max = Math.max(oldLines.length, newLines.length);
  let out = `=== diff ===\n旧 (${time}) → 現在\n\n`;
  const oldSet = new Set(oldLines);
  const newSet = new Set(newLines);
  for (let i = 0; i < max; i++) {
    const a = oldLines[i] ?? '';
    const b = newLines[i] ?? '';
    if (a === b) out += `  ${a}\n`;
    else {
      if (a && !newSet.has(a)) out += `- ${a}\n`;
      if (b && !oldSet.has(b)) out += `+ ${b}\n`;
      if (a && newSet.has(a) && b && oldSet.has(b)) out += `~ ${a} → ${b}\n`;
    }
  }
  alert(out.length > 3000 ? out.slice(0, 3000) + '\n…' : out);
}

async function previewCommit(commitId) {
  if (!currentFile) return;
  const r = await api(`/api/files/${currentFile.id}/commits/${commitId}`);
  if (!r.ok) return alert('取得失敗');
  const text = await r.text();
  alert(`commit ${commitId.slice(0, 8)}…\n\n${text.length > 1500 ? text.slice(0, 1500) + '…' : text}`);
}

async function rollbackToCommit(commitId, time) {
  if (!currentFile) return;
  if (!confirm(`"${currentFile.display_name}" を ${time} の時点に戻しますか？\n(履歴は破壊されず、新しいコミットとして記録されます)`)) return;
  const r = await api(
    `/api/files/${currentFile.id}/rollback/${commitId}?message=` +
      encodeURIComponent(`rollback to ${time}`),
    { method: 'POST' }
  );
  if (!r.ok) return alert('rollback失敗: ' + await r.text());
  await showFile(currentFile);
  await loadFiles();
}

async function doUpload() {
  const fileInput = $('upload-file');
  let name = $('upload-name').value.trim();
  let body;
  if (fileInput.files.length > 0) {
    const f = fileInput.files[0];
    if (!name) name = f.name;
    body = await f.arrayBuffer();
  } else {
    if (!name) return alert('ファイル名 or アップロードファイルを指定してください');
    body = new TextEncoder().encode($('upload-content').value || '').buffer;
  }
  const r = await api('/api/files?name=' + encodeURIComponent(name), {
    method: 'POST',
    body,
    headers: { 'content-type': 'application/octet-stream' },
  });
  if (!r.ok) return alert('登録失敗: ' + await r.text());
  $('upload-name').value = '';
  $('upload-content').value = '';
  fileInput.value = '';
  await refresh();
}

function toggleEdit() {
  const ed = $('fd-editor');
  if (ed.style.display === 'none') {
    $('fd-edit-textarea').value = currentContent;
    $('fd-edit-message').value = '';
    ed.style.display = 'block';
  } else {
    ed.style.display = 'none';
  }
}

async function saveEdit() {
  if (!currentFile) return;
  const newContent = $('fd-edit-textarea').value;
  const msg = $('fd-edit-message').value;
  const url = `/api/files/${currentFile.id}/content` + (msg ? `?message=${encodeURIComponent(msg)}` : '');
  const r = await api(url, {
    method: 'POST',
    body: new TextEncoder().encode(newContent).buffer,
    headers: { 'content-type': 'application/octet-stream' },
  });
  if (!r.ok) return alert('保存失敗: ' + await r.text());
  await showFile(currentFile);
  await refresh();
}

async function addTagToCurrent() {
  if (!currentFile) return;
  const name = $('fd-add-tag').value.trim();
  if (!name) return;
  // 既存タグなら upsert で同じID返る、新規でも作成される
  const created = await json('/api/tags', { method: 'POST', body: { name } });
  const r = await api(`/api/files/${currentFile.id}/tags`, {
    method: 'POST', body: JSON.stringify({ tag_id: created.id }),
    headers: { 'content-type': 'application/json' },
  });
  if (!r.ok) return alert('タグ追加失敗: ' + await r.text());
  $('fd-add-tag').value = '';
  await showFile(currentFile);
  await loadTags();
}

async function detachTagFromCurrent(tagId) {
  if (!currentFile) return;
  const r = await api(`/api/files/${currentFile.id}/tags/${tagId}`, { method: 'DELETE' });
  if (!r.ok) return alert('タグ取り外し失敗');
  await showFile(currentFile);
  await loadTags();
}

async function addToSeries() {
  if (!currentFile) return;
  const sid = $('fd-add-series').value;
  if (!sid) return alert('シリーズを選択してください');
  await json(`/api/series/${sid}/members`, {
    method: 'POST',
    body: { file_id: currentFile.id },
  });
  alert('追加しました');
}

function doSearch() {
  searchQuery = $('search-input').value.trim();
  loadFiles();
}
function clearSearch() {
  searchQuery = '';
  $('search-input').value = '';
  loadFiles();
}

async function deleteCurrentFile() {
  if (!currentFile) return;
  if (!confirm(`"${currentFile.display_name}" を削除しますか？`)) return;
  const r = await api(`/api/files/${currentFile.id}`, { method: 'DELETE' });
  if (!r.ok) return alert('削除失敗: ' + await r.text());
  $('file-detail').style.display = 'none';
  currentFile = null;
  await refresh();
}

async function issueShare() {
  if (!currentFile) return;
  const ttl = prompt('有効秒数を入力してください', '3600');
  if (!ttl) return;
  const r = await json(`/api/files/${currentFile.id}/share`, {
    method: 'POST',
    body: { ttl_secs: parseInt(ttl, 10) },
  });
  const fullUrl = location.origin + r.url;
  $('fd-share').innerHTML = `共有URL (${ttl}秒): <a href="${fullUrl}" target="_blank">${fullUrl}</a>`;
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

$('logout').onclick = logout;
init();
</script>
