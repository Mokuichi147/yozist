{% extends "base.html" %}
{% block title %}yozist - ゴミ箱{% endblock %}

{% block content %}
<div id="main" class="hidden max-w-5xl mx-auto p-4">
  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">

      <div class="flex flex-wrap items-center gap-2 mb-1">
        <h2 class="text-sm font-semibold">
          ゴミ箱 <span class="opacity-60" id="trash-count"></span>
        </h2>
        <div class="flex-1"></div>
        <button id="empty-trash-btn" class="btn btn-xs btn-error btn-outline" onclick="emptyTrash()" disabled>
          空にする
        </button>
      </div>
      <p class="text-xs opacity-60 mb-2">
        削除したファイルがここに残ります。「復元」で元に戻せます。「完全に削除」すると元に戻せません。
      </p>

      <ul class="space-y-0.5" id="trash-list">
        <li class="px-2 py-2 opacity-50 text-sm">読み込み中…</li>
      </ul>

      <div id="load-more-wrap" class="hidden pt-3 text-center">
        <button id="load-more" class="btn btn-sm btn-wide" onclick="loadMore()">さらに読み込む</button>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block script %}
<script src="/ui/pages/trash.js"></script>
{% endblock %}
