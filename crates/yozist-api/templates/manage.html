{% extends "base.html" %}
{% block title %}yozist - 管理{% endblock %}

{% block content %}
<div id="main" class="hidden max-w-3xl mx-auto p-4 space-y-4">

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">groups</h2>
        <button class="btn btn-xs" onclick="createGroup()">+ 新規</button>
      </div>
      <div id="group-list" class="text-sm space-y-1">…</div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">active shares</h2>
        <button class="btn btn-xs btn-ghost" onclick="loadShares()">refresh</button>
      </div>
      <div id="share-list" class="text-sm space-y-1">…</div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-xs uppercase tracking-wider opacity-60 font-semibold">audit log</h2>
        <button class="btn btn-xs btn-ghost" onclick="loadAudit()">refresh</button>
      </div>
      <div id="audit-list" class="text-sm space-y-1">…</div>
    </div>
  </div>

</div>

<!-- グループメンバー管理モーダル -->
<dialog id="gm-modal" class="modal">
  <div class="modal-box">
    <h3 class="font-bold text-lg break-all">グループ「<span id="gm-name"></span>」のメンバー</h3>
    <div class="mt-3">
      <h4 class="text-xs uppercase tracking-wider opacity-60 mb-1">現在のメンバー</h4>
      <div id="gm-members" class="space-y-1">…</div>
    </div>
    <div class="mt-4">
      <h4 class="text-xs uppercase tracking-wider opacity-60 mb-1">ユーザーを追加</h4>
      <div class="join w-full">
        <select id="gm-add-select" class="select select-bordered select-sm join-item w-full"></select>
        <button id="gm-add-btn" class="btn btn-sm join-item btn-primary">追加</button>
      </div>
    </div>
    <div class="modal-action">
      <button id="gm-close" class="btn btn-sm">閉じる</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
{% endblock %}

{% block script %}
<script src="/ui/pages/manage.js"></script>
{% endblock %}
