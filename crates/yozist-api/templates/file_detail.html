{% extends "base.html" %}
{% block title %}yozist - file{% endblock %}
{% block subtabs %}<span class="opacity-40">›</span><span class="font-semibold">詳細</span>{% endblock %}

{% block content %}
<div id="not-found" class="hidden max-w-md mx-auto mt-24">
  <div class="alert alert-error">
    <span>ファイルが見つかりません。<a href="/ui/files" class="link">一覧へ戻る</a></span>
  </div>
</div>

<div id="main" class="hidden max-w-7xl mx-auto">
  <div class="mb-3 text-sm">
    <a href="/ui/files" class="link link-hover">← ファイル一覧</a>
  </div>

  <div class="flex flex-col lg:flex-row gap-4 items-start">
    <!-- メインカラム: content を優先表示 -->
    <div class="flex-1 min-w-0 w-full space-y-4">
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <div class="flex items-start justify-between gap-2">
            <h2 id="fd-name" class="card-title text-lg break-all">…</h2>
            <button id="fd-edit-btn" class="btn btn-sm hidden shrink-0" onclick="toggleEdit()">編集</button>
          </div>

          <div id="fd-editor" class="hidden space-y-2">
            <div id="fd-edit-note" class="hidden text-xs text-warning"></div>
            <textarea id="fd-edit-textarea"
                      class="textarea textarea-bordered w-full font-mono text-xs"
                      rows="18"></textarea>
            <div class="join w-full">
              <input id="fd-edit-message" class="input input-bordered input-sm join-item w-full"
                     placeholder="コミットメッセージ (任意)">
              <button class="btn btn-primary btn-sm join-item" onclick="saveEdit()">保存</button>
              <button class="btn btn-sm join-item" onclick="toggleEdit()">キャンセル</button>
            </div>
          </div>

          <div id="fd-content" class="min-h-[2rem]">…</div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-0">
          <div class="collapse collapse-arrow">
            <input type="checkbox">
            <div class="collapse-title text-sm font-semibold">history</div>
            <div class="collapse-content">
              <div id="fd-history" class="space-y-1">…</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- サイドカラム: 操作・詳細情報・タグ・シリーズ -->
    <aside class="w-full lg:w-80 shrink-0 space-y-4">
      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4 gap-2">
          <button class="btn btn-sm btn-block" onclick="downloadContent()">ダウンロード</button>
          <button class="btn btn-sm btn-block" onclick="$('fd-upload-input').click()">内容を更新</button>
          <input id="fd-upload-input" type="file" class="hidden" onchange="uploadContent(this.files[0])">
          <button class="btn btn-sm btn-block" onclick="issueShare()">共有URL</button>
          <button class="btn btn-sm btn-block" onclick="grantPermission()">権限付与</button>
          <button class="btn btn-sm btn-block btn-error btn-outline" onclick="deleteFile()">削除</button>
          <div id="fd-share" class="text-xs break-all"></div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-xs uppercase tracking-wider opacity-60 font-semibold">詳細情報</h3>
          <div id="fd-meta" class="text-xs"></div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-xs uppercase tracking-wider opacity-60 font-semibold">タグ</h3>
          <div class="join w-full">
            <input id="fd-add-tag" class="input input-bordered input-sm join-item w-full"
                   placeholder="タグ名を入力して追加"
                   oninput="renderTags()" onfocus="renderTags()">
            <button class="btn btn-sm join-item" onclick="addTag()">+</button>
          </div>
          <div id="fd-tags" class="flex flex-wrap gap-2 mt-1"></div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-xs uppercase tracking-wider opacity-60 font-semibold">シリーズ</h3>
          <div class="join w-full mt-1">
            <select id="fd-add-series" class="select select-bordered select-sm join-item w-full">
              <option value="">シリーズ選択…</option>
            </select>
            <button class="btn btn-sm join-item" onclick="addToSeries()">+</button>
          </div>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- 権限付与モーダル -->
<dialog id="perm-modal" class="modal">
  <form id="perm-form" class="modal-box max-w-md">
    <h3 class="font-bold text-lg">権限を付与</h3>
    <div class="mt-3 space-y-3">
      <div>
        <label class="block text-sm mb-1">ユーザー</label>
        <select id="perm-user" class="select select-bordered select-sm w-full"></select>
      </div>
      <div>
        <label class="block text-sm mb-1">権限レベル</label>
        <select id="perm-mask" class="select select-bordered select-sm w-full">
          <option value="1">閲覧のみ (VIEW)</option>
          <option value="3" selected>読取 (VIEW + READ)</option>
          <option value="7">書込 (VIEW + READ + WRITE)</option>
          <option value="15">管理 (フル権限)</option>
        </select>
      </div>
      <div>
        <label class="block text-sm mb-1">種別</label>
        <div class="flex gap-4">
          <label class="flex items-center gap-1 text-sm">
            <input type="radio" name="perm-allow" value="allow" class="radio radio-sm" checked> 許可 (allow)
          </label>
          <label class="flex items-center gap-1 text-sm">
            <input type="radio" name="perm-allow" value="deny" class="radio radio-sm"> 拒否 (deny)
          </label>
        </div>
      </div>
    </div>
    <div class="modal-action">
      <button type="button" id="perm-cancel" class="btn btn-sm">キャンセル</button>
      <button type="submit" class="btn btn-sm btn-primary">付与</button>
    </div>
  </form>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
{% endblock %}

{% block script %}
<script>
const fileId = location.pathname.split('/').pop();
let currentFile = null;
let canEdit = false;          // 現在の content がテキスト編集可能か
let contentObjectUrl = null;  // メディアプレビュー用の object URL
let allTags = [];             // 全タグ（割り当て数の多い順）
let assignedTags = [];        // このファイルに割り当て済みのタグ
let assignedTagIds = new Set(); // このファイルに割り当て済みのタグ ID

// --- テキストの仮想スクロール状態 ---
// 巨大ファイルでも全体を読まず、スクロール位置に応じてチャンクを動的にロードし、
// 画面から離れたチャンクは解放（リリース）してメモリを一定に保つ。
// ビューアはストレージの生 UTF-8 を読む（?utf8=1）。UTF-8 は継続バイトで文字
// 境界を判定でき、チャンクを独立にデコード／解放／再ロードできるため。
const TEXT_CHUNK_BYTES = 256 * 1024;   // 1 チャンクのバイト数
const TEXT_WINDOW_CHUNKS = 8;          // 同時にロードしておく最大チャンク数（≒2MB）
let textTotalBytes = 0;                // content 全体のバイト数（UTF-8）
let textNumChunks = 0;                 // 総チャンク数
let textWinStart = 0;                  // ロード中ウィンドウの先頭チャンク index
let textWinEnd = 0;                    // ロード中ウィンドウの末尾 +1（[start, end)）
let textEstChunkH = 0;                 // 1 チャンクの推定ピクセル高（下スペーサー用）
let textTopH = 0;                      // 上スペーサー高（解放済み先頭チャンクの実高合計）
let textMaxLoadedChunk = 0;            // これまでにロードした最大チャンク index（編集範囲用）
let textBusy = false;                  // ロード処理の多重実行防止
let editKeepFrom = null;               // 部分編集時、保持する末尾の開始位置（UTF-8 バイト）

// 拡張子 → MIME（mime 未設定ファイルのフォールバック）
const EXT_MIME = {
  png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif',
  webp:'image/webp', svg:'image/svg+xml', bmp:'image/bmp', ico:'image/x-icon', avif:'image/avif',
  mp4:'video/mp4', webm:'video/webm', ogv:'video/ogg', mov:'video/quicktime', m4v:'video/x-m4v', mkv:'video/x-matroska',
  mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg', oga:'audio/ogg', flac:'audio/flac', m4a:'audio/mp4', aac:'audio/aac',
  pdf:'application/pdf',
};
// 拡張子だけでテキストと判断できるもの（mime 未設定でもプレビューする）
const TEXT_EXT = new Set([
  'txt','md','markdown','json','xml','html','htm','css','js','mjs','ts','tsx','jsx',
  'csv','tsv','yaml','yml','toml','ini','cfg','conf','log','sh','bash','zsh','py',
  'rs','go','c','h','cpp','hpp','cc','java','kt','rb','php','sql','svg',
]);

function extOf(name) { return (name.split('.').pop() || '').toLowerCase(); }

function fmtSize(n) {
  n = Number(n) || 0;
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
  return (n / 1024 / 1024 / 1024).toFixed(1) + ' GB';
}

// content の表示種別を判定（mime 優先、なければ拡張子）
function mediaKind(mime, name) {
  const m = (mime || '').toLowerCase();
  const ext = extOf(name);
  if (m.startsWith('image/') || /^(png|jpe?g|gif|webp|svg|bmp|ico|avif)$/.test(ext)) return 'image';
  if (m.startsWith('video/') || /^(mp4|webm|ogv|mov|m4v|mkv)$/.test(ext)) return 'video';
  if (m.startsWith('audio/') || /^(mp3|wav|ogg|oga|flac|m4a|aac)$/.test(ext)) return 'audio';
  if (m === 'application/pdf' || ext === 'pdf') return 'pdf';
  if (m.startsWith('text/') || /(json|xml|javascript|csv|yaml|x-sh)/.test(m) || TEXT_EXT.has(ext)) return 'text';
  return 'unknown';
}

// レンダリングや Blob 生成に使う MIME を決める
function effectiveMime() {
  return currentFile.mime || EXT_MIME[extOf(currentFile.display_name)] || 'application/octet-stream';
}

async function init() {
  const me = await requireAuth();
  if (!me) return;
  try {
    currentFile = await json('/api/files/' + fileId);
  } catch (e) {
    $('not-found').classList.remove('hidden');
    return;
  }
  $('main').classList.remove('hidden');
  document.title = 'yozist - ' + currentFile.display_name;
  await Promise.all([loadSeriesOptions(), loadDetail()]);
}

async function loadSeriesOptions() {
  try {
    const list = await json('/api/series');
    $('fd-add-series').innerHTML = '<option value="">シリーズ選択…</option>' +
      list.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
  } catch (e) {}
}

async function loadDetail() {
  $('fd-name').textContent = currentFile.display_name;
  const metaRow = (label, value, mono) =>
    `<div><dt class="opacity-50">${label}</dt>` +
    `<dd class="break-all${mono ? ' font-mono' : ''}">${value}</dd></div>`;
  $('fd-meta').innerHTML = `<dl class="space-y-2">
    ${metaRow('サイズ', fmtSize(currentFile.size))}
    ${metaRow('MIME', escapeHtml(currentFile.mime || '—'))}
    ${currentFile.charset ? metaRow('文字コード', escapeHtml(currentFile.charset)) : ''}
    ${metaRow('ID', escapeHtml(currentFile.id), true)}
    ${metaRow('current_commit', escapeHtml(currentFile.current_commit), true)}
  </dl>`;
  $('fd-share').textContent = '';
  await Promise.all([loadTags(), loadHistory(), renderContent()]);
}

// 種別ごとのバッジ配色（files 一覧と統一。ダークでも視認できるよう塗りつぶし）
function tagVariant(kind) {
  return kind === 'system' ? 'badge-neutral'
       : kind === 'ai' ? 'badge-warning'
       : 'badge-primary';
}
function tagIcon(kind) {
  return kind === 'system' ? ' ⚙' : kind === 'ai' ? ' 🤖' : '';
}

async function loadTags() {
  assignedTags = await json(`/api/files/${fileId}/tags`);
  assignedTagIds = new Set(assignedTags.map(t => t.id));
  await loadTagCandidates();
}

// 全タグを割り当て数の多い順で取得し、タグ表示を再描画する。
async function loadTagCandidates() {
  try {
    allTags = await json('/api/tags?sort=usage');
  } catch (e) {
    allTags = [];
  }
  renderTags();
}

// 割り当て済みタグ + 候補（未選択）を同じコンテナにまとめて描画する。
// 候補は入力中の文字列でフィルターし、割り当て済みを除いて多い順で並べる。
function renderTags() {
  const box = $('fd-tags');
  if (!box) return;
  const q = $('fd-add-tag').value.trim().toLowerCase();

  // 割り当て済み（選択済み）。システムタグ（ext:/type: 等）は自動付与で詳細情報に
  // MIME 等として表示されるため、タグカードには出さない。
  const assignedHtml = assignedTags
    .filter(t => t.kind !== 'system')
    .map(t =>
      // 手動/AI タグはバッジ全体をクリックで削除（当たり判定を広く取る）
      `<button type="button" class="badge badge-sm ${tagVariant(t.kind)} gap-1 cursor-pointer hover:badge-error"
              title="クリックでタグを外す" onclick="detachTag('${t.id}')">
        ${escapeHtml(t.name)}${tagIcon(t.kind)}
        <span class="leading-none opacity-70">×</span>
      </button>`
    ).join('');

  // 候補（未選択）。システムタグ・割り当て済みは除外し、入力でフィルター。
  const cands = allTags.filter(t =>
    t.kind !== 'system' &&
    !assignedTagIds.has(t.id) &&
    (q === '' || t.name.toLowerCase().includes(q))
  );
  const candHtml = cands.slice(0, 30).map(t =>
    `<button type="button"
             class="badge badge-sm badge-outline ${tagVariant(t.kind)} cursor-pointer hover:badge-soft"
             title="このタグを割り当てる" onclick="assignExistingTag('${t.id}')">+ ${escapeHtml(t.name)}${tagIcon(t.kind)}</button>`
  ).join('');

  if (!assignedHtml && !candHtml) {
    box.innerHTML = '<span class="opacity-50 text-xs">タグなし</span>';
    return;
  }
  box.innerHTML = assignedHtml + candHtml;
}

// 既存タグを割り当てる（候補クリック時）。
async function assignExistingTag(tagId) {
  const r = await api(`/api/files/${fileId}/tags`, {
    method: 'POST', body: JSON.stringify({ tag_id: tagId }),
    headers: { 'content-type': 'application/json' },
  });
  if (!r.ok) { uiToast('タグ追加に失敗しました: ' + await r.text(), 'error'); return; }
  $('fd-add-tag').value = '';
  await loadTags();
}

async function loadHistory() {
  const history = await json(`/api/files/${fileId}/history`);
  const currentCommitId = currentFile.current_commit;
  $('fd-history').innerHTML = history.length === 0
    ? '<div class="opacity-50 text-xs">履歴なし</div>'
    : history.map(c => {
        const isCurrent = c.id === currentCommitId;
        const time = fmtTs(c.timestamp);
        return `<div class="row-compact flex items-center justify-between gap-2 text-xs">
          <div class="truncate">
            ${isCurrent ? '<span class="text-warning font-bold">★</span> ' : ''}
            <span class="opacity-70">${time}</span>
            <span class="opacity-60">${escapeHtml(c.format_id)}</span>
            ${escapeHtml(c.message || '')}
          </div>
          <div class="flex gap-1 shrink-0">
            <a class="btn btn-xs" href="/ui/files/${fileId}/compare?base=${c.id}&compare=${currentCommitId}" title="現在の内容と比較">Δ 比較</a>
            <a class="btn btn-xs" href="/ui/files/${fileId}/histories/${c.id}">表示</a>
            ${isCurrent ? '' : `<button class="btn btn-xs btn-warning btn-outline"
              onclick="rollback('${c.id}','${time}')">戻す</button>`}
          </div>
        </div>`;
      }).join('');
}

function revokeContentUrl() {
  if (contentObjectUrl) { URL.revokeObjectURL(contentObjectUrl); contentObjectUrl = null; }
}

// 認証付きで content を取得し、正しい MIME を付与した object URL にする。
// （Bearer 認証のため <img src> 等で直接参照できず、fetch + Blob が必要）
async function fetchContentBytes() {
  const r = await api(`/api/files/${fileId}/content`);
  if (!r.ok) throw new Error((await r.text().catch(() => '')) || r.statusText);
  return r.arrayBuffer();
}

async function objectUrlFor(mime) {
  const buf = await fetchContentBytes();
  revokeContentUrl();
  contentObjectUrl = URL.createObjectURL(new Blob([buf], { type: mime }));
  return contentObjectUrl;
}

// 先頭にヌルバイトを含むものはバイナリとみなす（UTF-8/ASCII テキストは含まない）
function looksBinary(buf) {
  const bytes = new Uint8Array(buf.slice(0, 8192));
  for (let i = 0; i < bytes.length; i++) if (bytes[i] === 0) return true;
  return false;
}

// content の [start, start+len) を Range リクエストで取得する。
// utf8=true でストレージの生 UTF-8 を取得（仮想スクロール／編集用）。
// 返り値 { buf, total }。total はサーバの Content-Range から得た全体バイト数
// （Range 非対応サーバが 200 で全体を返した場合は本文長）。
async function fetchContentRange(start, len, utf8) {
  const end = start + len - 1; // inclusive
  const path = `/api/files/${fileId}/content` + (utf8 ? '?utf8=1' : '');
  const r = await api(path, { headers: { Range: `bytes=${start}-${end}` } });
  if (!r.ok && r.status !== 206) {
    throw new Error((await r.text().catch(() => '')) || r.statusText);
  }
  const buf = await r.arrayBuffer();
  let total = buf.byteLength;
  const cr = r.headers.get('Content-Range'); // "bytes start-end/total"
  const m = cr && /\/(\d+)\s*$/.exec(cr);
  if (m) total = parseInt(m[1], 10);
  return { buf, total };
}

// チャンク i（UTF-8 ストレージ空間）のテキストを取得する。
// 文字は「先頭バイトが属するチャンク」が所有する規約で分割し、境界の
// マルチバイト文字を欠落・重複なく復元する（末尾を最大 3 バイト多めに読む）。
async function fetchUtf8ChunkText(i) {
  const start = i * TEXT_CHUNK_BYTES;
  const chunkEnd = Math.min(start + TEXT_CHUNK_BYTES, textTotalBytes); // exclusive
  const reqEnd = Math.min(chunkEnd + 3, textTotalBytes);              // 末尾文字の補完分
  const { buf } = await fetchContentRange(start, reqEnd - start, true);
  const bytes = new Uint8Array(buf);
  // 先頭: 継続バイト(0b10xxxxxx)は前チャンク所有の文字 → 読み飛ばす。
  let s = 0;
  while (s < bytes.length && (bytes[s] & 0xC0) === 0x80) s++;
  // 末尾: chunkEnd 位置が継続バイトなら、その文字は本チャンク所有 → 完了まで含める。
  let e = Math.min(chunkEnd - start, bytes.length);
  while (e < bytes.length && (bytes[e] & 0xC0) === 0x80) e++;
  if (e < s) e = s;
  return new TextDecoder('utf-8', { fatal: false }).decode(bytes.subarray(s, e));
}

// content をデータ種別に応じた要素で描画する
async function renderContent() {
  revokeContentUrl();
  canEdit = false;
  const cont = $('fd-content');
  cont.classList.remove('hidden');  // 編集後の再描画時に表示専用欄を確実に復帰
  cont.innerHTML = '<span class="opacity-50 text-xs">読み込み中…</span>';
  const kind = mediaKind(currentFile.mime, currentFile.display_name);
  const mime = effectiveMime();
  try {
    if (kind === 'image') {
      const url = await objectUrlFor(mime);
      cont.innerHTML = `<img src="${url}" alt="${escapeHtml(currentFile.display_name)}"
        class="max-w-full max-h-[70vh] object-contain mx-auto block rounded bg-base-300/30">`;
    } else if (kind === 'video') {
      const url = await objectUrlFor(mime);
      cont.innerHTML = `<video src="${url}" controls
        class="max-w-full max-h-[70vh] mx-auto block rounded bg-black"></video>`;
    } else if (kind === 'audio') {
      const url = await objectUrlFor(mime);
      cont.innerHTML = `<audio src="${url}" controls class="w-full mt-2"></audio>`;
    } else if (kind === 'pdf') {
      const url = await objectUrlFor(mime);
      cont.innerHTML = `<iframe src="${url}" title="${escapeHtml(currentFile.display_name)}"
        class="w-full h-[70vh] rounded border border-base-300"></iframe>`;
    } else {
      // text / unknown: 分割取得で表示（巨大ファイル対策）。
      await renderTextContent(cont, kind);
    }
  } catch (e) {
    cont.innerHTML = `<span class="text-error text-xs">content の読み込みに失敗しました: ${escapeHtml(e.message)}</span>`;
  }
  $('fd-edit-btn').classList.toggle('hidden', !canEdit);
}

// テキスト/不明データを仮想スクロールで表示する。
// 1 つの <pre>（fd-text-body）にチャンク単位の textNode を並べ、上下のスペーサーで
// 未ロード領域の高さを確保する。スクロールに応じてチャンクをロード／解放する。
async function renderTextContent(cont, kind) {
  // 先頭チャンクを取得（バイナリ判定にも使う）。
  const first = await fetchUtf8ChunkProbe();
  if (kind === 'unknown' && !currentFile.charset && looksBinary(first.buf)) {
    renderBinary(cont);
    return;
  }
  canEdit = true;
  textTotalBytes = first.total;
  textNumChunks = Math.max(1, Math.ceil(textTotalBytes / TEXT_CHUNK_BYTES));

  cont.innerHTML =
    `<div id="fd-text-scroll" class="relative bg-base-300/50 rounded text-xs overflow-auto max-h-[75vh] [overflow-anchor:none]">` +
    `<div id="fd-text-top"></div>` +
    `<pre id="fd-text-body" class="m-0 px-3 py-2 whitespace-pre-wrap break-words"></pre>` +
    `<div id="fd-text-bottom"></div>` +
    `</div>`;

  // 先頭チャンクを表示し、推定高を確定。
  const body = $('fd-text-body');
  body.appendChild(makeChunkNode(0, first.text));
  textWinStart = 0;
  textWinEnd = 1;
  textMaxLoadedChunk = 0;
  textTopH = 0;
  textEstChunkH = Math.max(40, body.offsetHeight);
  setSpacer('fd-text-top', 0);
  setSpacer('fd-text-bottom', textEstChunkH * (textNumChunks - 1));

  const scroll = $('fd-text-scroll');
  let scheduled = false;
  scroll.addEventListener('scroll', () => {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => { scheduled = false; onTextScroll(scroll); });
  });
}

// 先頭チャンクの生バイト（バイナリ判定用）・total・トリム済みテキストを取得する。
// チャンク 0 は先頭の読み飛ばしが不要で、末尾だけ次文字の途中で切らないよう詰める。
async function fetchUtf8ChunkProbe() {
  const { buf, total } = await fetchContentRange(0, TEXT_CHUNK_BYTES, true);
  const bytes = new Uint8Array(buf);
  let e = bytes.length;
  // total が 1 チャンクより大きいときのみ末尾が途中の可能性がある。
  if (total > TEXT_CHUNK_BYTES) {
    e = Math.min(TEXT_CHUNK_BYTES, bytes.length);
    while (e < bytes.length && (bytes[e] & 0xC0) === 0x80) e++;
  }
  const text = new TextDecoder('utf-8', { fatal: false }).decode(bytes.subarray(0, e));
  return { buf, total, text };
}

// チャンク textNode を <span data-i> で包む（解放・計測のため identity を持たせる）。
function makeChunkNode(i, text) {
  const span = document.createElement('span');
  span.dataset.i = String(i);
  span.appendChild(document.createTextNode(text));
  return span;
}

function setSpacer(id, h) {
  const el = $(id);
  if (el) el.style.height = Math.max(0, Math.round(h)) + 'px';
}

// スクロール位置に応じてウィンドウを前後へ伸縮させる。
// 幾何モデル: 上スペーサー(textTopH=解放済み先頭チャンクの実高合計) + 本文(pre) +
// 下スペーサー(未ロード末尾チャンクの推定高)。読込済み本文の上下端に viewport が
// 近づいたら、その方向へチャンクをロードし、ウィンドウ超過分を反対側で解放する。
async function onTextScroll(scroll) {
  if (textBusy) return;
  textBusy = true;
  try {
    const NEAR = 800;      // 端からこの px 以内に来たらロード
    const body = $('fd-text-body');
    if (!body) return;

    // スクロールバーを大きくドラッグして本文から大きく外れた場合は、推定位置へ
    // ウィンドウごと飛ばす（順次ロードでの長い空白を避ける）。
    const contentTop = body.offsetTop;
    const contentBottom = body.offsetTop + body.offsetHeight;
    if (scroll.scrollTop > contentBottom + textEstChunkH ||
        scroll.scrollTop + scroll.clientHeight < contentTop - textEstChunkH) {
      await relocateWindow(Math.round(scroll.scrollTop / Math.max(1, textEstChunkH)));
    }

    // 下方向: viewport 下端が本文末尾に近づく間、次チャンクを足す。
    let guard = 0;
    while (textWinEnd < textNumChunks && guard++ < 64) {
      const bottom = body.offsetTop + body.offsetHeight;
      if (scroll.scrollTop + scroll.clientHeight < bottom - NEAR) break;
      await appendChunk();
      trimTop();
    }
    // 上方向: viewport 上端が本文先頭に近づく間、前チャンクを足す。
    guard = 0;
    while (textWinStart > 0 && guard++ < 64) {
      if (scroll.scrollTop > body.offsetTop + NEAR) break;
      await prependChunk();
      trimBottom();
    }
  } catch (e) {
    // 取得失敗時は次のスクロールで再試行する（ループを止めるだけ）。
    console.error('text chunk load failed:', e);
  } finally {
    textBusy = false;
  }
}

// 末尾に次チャンクを追加（本文下端に実コンテンツが伸び、下スペーサーは推定で縮む）。
async function appendChunk() {
  const i = textWinEnd;
  const text = await fetchUtf8ChunkText(i);
  const body = $('fd-text-body');
  if (!body) return;
  body.appendChild(makeChunkNode(i, text));
  textWinEnd = i + 1;
  textMaxLoadedChunk = Math.max(textMaxLoadedChunk, i);
  setSpacer('fd-text-bottom', textEstChunkH * (textNumChunks - textWinEnd));
}

// 先頭に前チャンクを追加。挿入で本文が下がるぶん、上スペーサーを同量縮めて相殺
// するため（実高どうしで一致）、scrollTop 補正なしで viewport が安定する。
async function prependChunk() {
  const i = textWinStart - 1;
  const text = await fetchUtf8ChunkText(i);
  const body = $('fd-text-body');
  if (!body) return;
  const before = body.offsetHeight;
  body.insertBefore(makeChunkNode(i, text), body.firstChild);
  const added = body.offsetHeight - before;
  textWinStart = i;
  textTopH = Math.max(0, textTopH - added);
  setSpacer('fd-text-top', textTopH);
}

// 大きなジャンプ時、ウィンドウを推定位置 target チャンクへ移す。
async function relocateWindow(target) {
  target = Math.max(0, Math.min(textNumChunks - 1, target));
  const body = $('fd-text-body');
  if (!body) return;
  body.replaceChildren();              // 既存ウィンドウは破棄（メモリ解放）
  textWinStart = target;
  textWinEnd = target;
  textTopH = textEstChunkH * target;   // ジャンプ先の上側は推定
  setSpacer('fd-text-top', textTopH);
  setSpacer('fd-text-bottom', textEstChunkH * (textNumChunks - target));
  await appendChunk();                 // target チャンクを描画（winEnd=target+1）
}

// 先頭チャンクを解放（下スクロール中）。除去で本文上端が縮むぶん上スペーサーを
// 同量伸ばすので、解放済みより下のコンテンツ位置は不変（viewport 安定）。
function trimTop() {
  const body = $('fd-text-body');
  while (textWinEnd - textWinStart > TEXT_WINDOW_CHUNKS) {
    const node = body.firstElementChild;
    if (!node) break;
    const before = body.offsetHeight;
    body.removeChild(node);
    textTopH += before - body.offsetHeight;
    textWinStart++;
    setSpacer('fd-text-top', textTopH);
  }
}

// 末尾チャンクを解放（上スクロール中）。下スペーサーを推定で戻す（viewport 上側に
// 影響しない）。
function trimBottom() {
  const body = $('fd-text-body');
  while (textWinEnd - textWinStart > TEXT_WINDOW_CHUNKS) {
    const node = body.lastElementChild;
    if (!node) break;
    body.removeChild(node);
    textWinEnd--;
    setSpacer('fd-text-bottom', textEstChunkH * (textNumChunks - textWinEnd));
  }
}

function renderBinary(cont) {
  cont.innerHTML = `
    <div class="flex flex-col items-center gap-3 py-10 text-center">
      <div class="text-4xl opacity-30">🗎</div>
      <div class="text-sm opacity-70">このファイルはプレビューに対応していません。</div>
      <div class="text-xs opacity-50 break-all">${escapeHtml(currentFile.mime || '不明な形式')} · ${fmtSize(currentFile.size)}</div>
      <button class="btn btn-sm btn-primary" onclick="downloadContent()">ダウンロード</button>
    </div>`;
}

async function downloadContent() {
  try {
    const blob = new Blob([await fetchContentBytes()], { type: effectiveMime() });
    const u = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = u;
    a.download = currentFile.display_name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(u), 1000);
  } catch (e) {
    uiToast('ダウンロードに失敗しました: ' + e.message, 'error');
  }
}

async function rollback(commitId, time) {
  if (!await uiConfirm(`"${currentFile.display_name}" を ${time} の時点に戻しますか？\n(新しいコミットとして記録されます)`, { danger: true, okText: '戻す' })) return;
  const r = await api(
    `/api/files/${fileId}/rollback/${commitId}?message=` +
      encodeURIComponent(`rollback to ${time}`),
    { method: 'POST' }
  );
  if (!r.ok) { uiToast('rollback に失敗しました: ' + await r.text(), 'error'); return; }
  uiToast('指定バージョンに戻しました', 'success');
  currentFile = await json('/api/files/' + fileId);
  await loadDetail();
}

async function toggleEdit() {
  if (!canEdit) { uiToast('このファイルはテキスト編集に対応していません', 'warning'); return; }
  const ed = $('fd-editor');
  const cont = $('fd-content');
  if (ed.classList.contains('hidden')) {
    // 部分読み込み中でも全文を取得せずに編集できる。スクロールで見た範囲
    // （先頭〜最大ロード位置）のみを編集対象とし、未読込の末尾はサーバ側で
    // 保持して結合する（keep_from）。
    const btn = $('fd-edit-btn');
    const label = btn.textContent;
    btn.disabled = true;
    btn.textContent = '読み込み中…';
    let prefix;
    try {
      prefix = await loadEditPrefix();
    } catch (e) {
      uiToast('編集データの読み込みに失敗しました: ' + e.message, 'error');
      return;
    } finally {
      btn.disabled = false;
      btn.textContent = label;
    }
    // 全文を読み込んでいれば通常の全置換、そうでなければ keep_from で末尾保持。
    editKeepFrom = prefix.full ? null : prefix.keepFrom;
    const ta = $('fd-edit-textarea');
    ta.value = prefix.text;
    $('fd-edit-message').value = '';
    const note = $('fd-edit-note');
    if (editKeepFrom != null) {
      note.textContent = `※ 表示中の先頭部分（${fmtSize(prefix.keepFrom)}）のみ編集できます。未読込の末尾（${fmtSize(textTotalBytes - prefix.keepFrom)}）はそのまま保持されます。`;
      note.classList.remove('hidden');
    } else {
      note.classList.add('hidden');
    }
    // 表示専用欄と同じ高さで編集できるよう、隠す前に現在の表示高さを引き継ぐ
    // （rows 固定だと内容に対して欄サイズが飛んでしまうのを防ぐ）
    const h = cont.offsetHeight;
    if (h > 0) ta.style.height = h + 'px';
    ed.classList.remove('hidden');
    // 表示専用欄を隠し、編集ボックスとの2重表示を防ぐ
    cont.classList.add('hidden');
  } else {
    ed.classList.add('hidden');
    cont.classList.remove('hidden');
  }
}

// 編集対象の先頭プレフィックスを取得する。
// 先頭〜「これまでにロードした最大チャンクの末尾」までを連続取得し、UTF-8 文字
// 境界に丸める。keepFrom はその正確なバイト長（= ストレージ上の保持開始位置）。
async function loadEditPrefix() {
  const wantEnd = Math.min((textMaxLoadedChunk + 1) * TEXT_CHUNK_BYTES, textTotalBytes);
  const reqEnd = Math.min(wantEnd + 3, textTotalBytes); // 末尾文字の補完分
  const { buf } = await fetchContentRange(0, reqEnd, true);
  const bytes = new Uint8Array(buf);
  let e = Math.min(wantEnd, bytes.length);
  while (e < bytes.length && (bytes[e] & 0xC0) === 0x80) e++;
  const text = new TextDecoder('utf-8', { fatal: false }).decode(bytes.subarray(0, e));
  return { text, keepFrom: e, full: e >= textTotalBytes };
}

async function saveEdit() {
  const newContent = $('fd-edit-textarea').value;
  const msg = $('fd-edit-message').value;
  // 部分編集（editKeepFrom != null）のときは keep_from を付けて末尾保持を依頼する。
  const params = new URLSearchParams();
  if (msg) params.set('message', msg);
  if (editKeepFrom != null) params.set('keep_from', String(editKeepFrom));
  const qs = params.toString();
  const url = `/api/files/${fileId}/content` + (qs ? `?${qs}` : '');
  const r = await api(url, {
    method: 'POST',
    body: new TextEncoder().encode(newContent).buffer,
    headers: { 'content-type': 'application/octet-stream' },
  });
  if (!r.ok) { uiToast('保存に失敗しました: ' + await r.text(), 'error'); return; }
  uiToast('保存しました', 'success');
  currentFile = await json('/api/files/' + fileId);
  $('fd-editor').classList.add('hidden');
  await loadDetail();
}

// アップロードしたファイルで content を置き換える（新しいコミットとして記録）。
// name を渡すことで display_name を更新し、mime/charset はサーバが新しい名前＋
// 内容から再判定する。
async function uploadContent(file) {
  const input = $('fd-upload-input');
  if (!file) return;
  try {
    if (!await uiConfirm(
      `"${currentFile.display_name}" の内容を "${file.name}" (${fmtSize(file.size)}) で更新しますか？\n(新しいコミットとして記録されます)`,
      { okText: '更新' }
    )) return;
    const url = `/api/files/${fileId}/content?name=` +
      encodeURIComponent(file.name) +
      `&message=` + encodeURIComponent(`upload ${file.name}`);
    const r = await api(url, {
      method: 'POST',
      body: await file.arrayBuffer(),
      headers: { 'content-type': 'application/octet-stream' },
    });
    if (!r.ok) { uiToast('更新に失敗しました: ' + await r.text(), 'error'); return; }
    uiToast('更新しました', 'success');
    currentFile = await json('/api/files/' + fileId);
    $('fd-editor').classList.add('hidden');
    await loadDetail();
  } finally {
    // 同じファイルを連続で選んでも change が発火するようリセット
    input.value = '';
  }
}

async function addTag() {
  const name = $('fd-add-tag').value.trim();
  if (!name) return;
  const created = await json('/api/tags', { method: 'POST', body: { name } });
  const r = await api(`/api/files/${fileId}/tags`, {
    method: 'POST', body: JSON.stringify({ tag_id: created.id }),
    headers: { 'content-type': 'application/json' },
  });
  if (!r.ok) { uiToast('タグ追加に失敗しました: ' + await r.text(), 'error'); return; }
  $('fd-add-tag').value = '';
  await loadTags();
}

async function detachTag(tagId) {
  const r = await api(`/api/files/${fileId}/tags/${tagId}`, { method: 'DELETE' });
  if (!r.ok) { uiToast('タグの取り外しに失敗しました', 'error'); return; }
  await loadTags();
}

async function addToSeries() {
  const sid = $('fd-add-series').value;
  if (!sid) { uiToast('シリーズを選択してください', 'warning'); return; }
  try {
    await json(`/api/series/${sid}/members`, { method: 'POST', body: { file_id: fileId } });
    uiToast('シリーズに追加しました', 'success');
  } catch (e) {
    uiToast('シリーズ追加に失敗しました: ' + e.message, 'error');
  }
}

async function issueShare() {
  const r = await uiPrompt({
    title: '共有URLの発行', okText: '発行',
    fields: [{ name: 'ttl', label: '有効期限 (秒)', type: 'number', value: '3600' }],
  });
  if (!r) return;
  const ttl = parseInt(r.ttl, 10);
  if (!ttl) { uiToast('有効期限を正しく入力してください', 'warning'); return; }
  try {
    const res = await json(`/api/files/${fileId}/share`, { method: 'POST', body: { ttl_secs: ttl } });
    const fullUrl = location.origin + res.url;
    $('fd-share').innerHTML = `共有URL (${ttl}秒): <a class="link link-primary" href="${fullUrl}" target="_blank">${escapeHtml(fullUrl)}</a>`;
    await uiCopyUrl(fullUrl, 'ファイル共有URL');
  } catch (e) {
    uiToast('共有URL発行に失敗しました: ' + e.message, 'error');
  }
}

async function grantPermission() {
  let users;
  try { users = await json('/api/users'); }
  catch (e) { uiToast('ユーザー取得に失敗しました', 'error'); return; }
  if (users.length === 0) { uiToast('ユーザーが存在しません', 'warning'); return; }
  $('perm-user').innerHTML = users.map(u =>
    `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
  $('perm-modal').showModal();
}

$('perm-form').onsubmit = async (e) => {
  e.preventDefault();
  const sel = $('perm-user');
  const userId = sel.value;
  const uname = sel.options[sel.selectedIndex].text;
  const mask = parseInt($('perm-mask').value, 10);
  const allow = document.querySelector('input[name="perm-allow"]:checked').value === 'allow';
  try {
    await json('/api/acl', {
      method: 'POST',
      body: { subject: `user:${userId}`, target: `file:${fileId}`, mask, allow, priority: 10 },
    });
    $('perm-modal').close();
    uiToast(`${uname} に ${allow ? '許可' : '拒否'} (mask=${mask}) を付与しました`, 'success');
  } catch (err) {
    uiToast('権限付与に失敗しました: ' + err.message, 'error');
  }
};
$('perm-cancel').onclick = () => $('perm-modal').close();

async function deleteFile() {
  if (!await uiConfirm(`"${currentFile.display_name}" を削除しますか？`, { danger: true, okText: '削除' })) return;
  const r = await api(`/api/files/${fileId}`, { method: 'DELETE' });
  if (!r.ok) { uiToast('削除に失敗しました: ' + await r.text(), 'error'); return; }
  location.href = '/ui/files';
}

init();
</script>
