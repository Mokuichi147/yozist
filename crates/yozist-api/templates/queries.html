{% extends "base.html" %}
{% block title %}yozist - 条件付きパス{% endblock %}

{% block content %}
<div id="main" class="hidden max-w-3xl mx-auto p-4 space-y-4">

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-base font-semibold">条件付きパス</h2>
        <button class="btn btn-sm btn-primary" onclick="openQueryModal('create')">+ 新規作成</button>
      </div>
      <p class="text-xs opacity-60 mb-3 leading-relaxed">
        条件にマッチするファイル群へ任意の名前を付けてアクセスできます。
      </p>
      <div id="query-list" class="text-sm space-y-1">…</div>
    </div>
  </div>

</div>

<!-- 条件付きパス 作成/編集モーダル（macOS スマートフォルダ風の条件ビルダー） -->
<dialog id="q-modal" class="modal">
  <div class="modal-box max-w-3xl">
    <h3 id="q-title" class="font-bold text-lg mb-3">条件付きパスの作成</h3>

    <div class="space-y-3">
      <div>
        <label class="text-xs uppercase tracking-wider opacity-60">パス名</label>
        <input id="q-name" type="text" class="input input-bordered input-sm w-full mt-1" placeholder="例: 仕事メモ" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider opacity-60">説明 (任意)</label>
        <input id="q-desc" type="text" class="input input-bordered input-sm w-full mt-1" />
      </div>

      <div>
        <div class="flex items-center gap-2 text-sm mb-2">
          <span class="opacity-70">次の</span>
          <select id="q-match" class="select select-bordered select-xs">
            <option value="all">すべて</option>
            <option value="any">いずれか</option>
          </select>
          <span class="opacity-70">の条件に一致するファイル</span>
        </div>
        <div id="q-rows" class="space-y-2"></div>
      </div>
    </div>

    <div class="modal-action">
      <button id="q-cancel" class="btn btn-sm">キャンセル</button>
      <button id="q-save" class="btn btn-sm btn-primary">保存</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- タグ候補は種別ごとに分ける（手動タグなら手動タグのみを補完） -->
<datalist id="tag-options-manual"></datalist>
<datalist id="tag-options-system"></datalist>
<datalist id="tag-options-ai"></datalist>
<datalist id="tag-options-all"></datalist>
<datalist id="series-options"></datalist>
{% endblock %}

{% block script %}
<script>
// 作成者本人のみ編集・削除を許可（サーバ側でも検証）。
let myUserId = null;
let editingId = null;

// フィールド定義（属性ドロップダウン）と、それぞれの「型」。
const FIELD_TYPE = {
  manual_tag: 'tag', system_tag: 'tag', ai_tag: 'tag', tag: 'tag',
  series: 'series', mime: 'mime', name: 'text', created: 'date', updated: 'date',
};
const FIELD_OPTIONS = `
  <optgroup label="タグ">
    <option value="manual_tag">手動タグ</option>
    <option value="system_tag">システムタグ</option>
    <option value="ai_tag">AIタグ</option>
    <option value="tag">タグ（種別不問）</option>
  </optgroup>
  <optgroup label="属性">
    <option value="series">シリーズ</option>
    <option value="mime">種類</option>
    <option value="name">名前</option>
    <option value="created">作成日</option>
    <option value="updated">更新日</option>
  </optgroup>`;
const MIME_PRESETS = [
  ['pdf', 'PDF'], ['image/', '画像'], ['text/', 'テキスト'], ['video/', '動画'],
  ['audio/', '音声'], ['word', 'Word'], ['sheet', 'Excel'],
  ['presentation', 'PowerPoint'], ['zip', 'ZIP/圧縮'],
];

async function init() {
  const me = await requireAuth();
  if (!me) return;
  myUserId = me.user && me.user.id;
  $('main').classList.remove('hidden');
  await Promise.all([loadQueries(), loadTagOptions(), loadSeriesOptions()]);
}

function canEditQuery(q) {
  return q.created_by == null || q.created_by === myUserId;
}

// ---- 一覧（条件を人間可読に整形） ----
const FIELD_LABEL = {
  manual_tag: '手動タグ', system_tag: 'システムタグ', ai_tag: 'AIタグ', tag: 'タグ',
  series: 'シリーズ', mime: '種類', name: '名前', created: '作成日', updated: '更新日',
};
const OP_LABEL = {
  include: 'を含む', exclude: 'を含まない', contains: 'を含む', not_contains: 'を含まない',
  is: 'と一致', is_not: 'と不一致', starts_with: 'で始まる', ends_with: 'で終わる',
  within: '以内', before: 'より前', after: 'より後',
};
const UNIT_LABEL = { day: '日', month: 'か月', year: '年' };

function condText(c) {
  const f = FIELD_LABEL[c.field] || c.field;
  if (c.field === 'created' || c.field === 'updated') {
    return `${f}が ${c.value}${UNIT_LABEL[c.unit] || ''} ${OP_LABEL[c.op] || c.op}`;
  }
  const mimeLabel = c.field === 'mime'
    ? (MIME_PRESETS.find(p => p[0] === c.value) || [c.value, c.value])[1]
    : c.value;
  return `${f}「${mimeLabel}」${OP_LABEL[c.op] || c.op}`;
}

function queryText(q) {
  const parts = [];
  (q.query.tags_and || []).forEach(t => parts.push(`タグ「${t}」を含む`));
  (q.query.tags_not || []).forEach(t => parts.push(`タグ「${t}」を含まない`));
  (q.query.conditions || []).forEach(c => parts.push(condText(c)));
  if (parts.length === 0) return '全件';
  const join = (q.query.match_mode === 'any') ? ' または ' : ' かつ ';
  return parts.join(join);
}

async function loadQueries() {
  const el = $('query-list');
  try {
    const list = await json('/api/queries');
    if (list.length === 0) { el.innerHTML = '<div class="opacity-50 text-sm py-2">条件付きパスはまだありません。「+ 新規作成」から追加してください。</div>'; return; }
    el.innerHTML = list.map(q => {
      const path = `smb://&lt;サーバ&gt;/yozist/queries/${escapeHtml(q.name)}/`;
      const mine = canEditQuery(q);
      const editBtns = mine ? `
          <button class="btn btn-xs" onclick="openQueryModal('edit','${q.id}')">編集</button>
          <button class="btn btn-xs btn-error btn-outline" onclick="deleteQuery('${q.id}','${escapeHtml(q.name)}')">削除</button>` : '';
      return `<div class="flex items-start justify-between row-compact gap-2 border-b border-base-200 last:border-0 py-2">
        <div class="min-w-0">
          <div><span class="font-semibold break-all">${escapeHtml(q.name)}</span></div>
          <div class="text-xs opacity-60 break-all">${escapeHtml(queryText(q))}</div>
          <div class="text-xs font-mono opacity-50 break-all">${path}</div>
          ${q.description ? `<div class="text-xs opacity-60 break-all">${escapeHtml(q.description)}</div>` : ''}
        </div>
        <div class="flex gap-1 shrink-0">
          <button class="btn btn-xs" onclick="shareQuery('${q.id}','${escapeHtml(q.name)}')">共有</button>
          ${editBtns}
        </div>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="opacity-50 text-xs">取得失敗</div>'; }
}

// 属性（タグ種別）→ 参照するタグ候補 datalist の対応。
const TAG_DATALIST = {
  manual_tag: 'tag-options-manual',
  system_tag: 'tag-options-system',
  ai_tag: 'tag-options-ai',
  tag: 'tag-options-all',
};

async function loadTagOptions() {
  try {
    const tags = await json('/api/tags');
    const opt = ts => ts.map(t => `<option value="${escapeHtml(t.name)}"></option>`).join('');
    // 種別ごとに候補を振り分け、種別不問用には全件を入れる。
    $('tag-options-manual').innerHTML = opt(tags.filter(t => t.kind === 'manual'));
    $('tag-options-system').innerHTML = opt(tags.filter(t => t.kind === 'system'));
    $('tag-options-ai').innerHTML = opt(tags.filter(t => t.kind === 'ai'));
    $('tag-options-all').innerHTML = opt(tags);
  } catch (e) { /* 候補なしでも手入力できる */ }
}
async function loadSeriesOptions() {
  try {
    const series = await json('/api/series');
    $('series-options').innerHTML = series.map(s => `<option value="${escapeHtml(s.name)}"></option>`).join('');
  } catch (e) { /* 同上 */ }
}

// ---- 条件ビルダー ----
function opOptions(type, op) {
  let opts;
  if (type === 'tag' || type === 'series' || type === 'mime') {
    opts = [['include', type === 'mime' ? 'を含む' : 'を含む'], ['exclude', 'を含まない']];
  } else if (type === 'text') {
    opts = [['contains', 'を含む'], ['is', 'と一致'], ['starts_with', 'で始まる'], ['ends_with', 'で終わる'], ['not_contains', 'を含まない']];
  } else { // date
    opts = [['within', '以内'], ['before', 'より前'], ['after', 'より後']];
  }
  return opts.map(([v, l]) => `<option value="${v}"${v === op ? ' selected' : ''}>${l}</option>`).join('');
}

function renderControls(type, op, value, unit, field) {
  const opSel = `<select class="q-op select select-bordered select-sm">${opOptions(type, op)}</select>`;
  const v = escapeHtml(value || '');
  if (type === 'tag') {
    const list = TAG_DATALIST[field] || 'tag-options-all';
    return `${opSel}<input class="q-val input input-bordered input-sm flex-1 min-w-0" list="${list}" placeholder="タグ名" value="${v}" />`;
  }
  if (type === 'series') {
    return `${opSel}<input class="q-val input input-bordered input-sm flex-1 min-w-0" list="series-options" placeholder="シリーズ名" value="${v}" />`;
  }
  if (type === 'mime') {
    const opts = MIME_PRESETS.map(([val, lbl]) => `<option value="${val}"${val === value ? ' selected' : ''}>${lbl}</option>`).join('');
    return `${opSel}<select class="q-val select select-bordered select-sm flex-1 min-w-0">${opts}</select>`;
  }
  if (type === 'text') {
    return `${opSel}<input class="q-val input input-bordered input-sm flex-1 min-w-0" placeholder="文字列" value="${v}" />`;
  }
  // date: [数値][単位][演算子]
  const units = [['day', '日'], ['month', 'か月'], ['year', '年']]
    .map(([val, lbl]) => `<option value="${val}"${val === (unit || 'day') ? ' selected' : ''}>${lbl}</option>`).join('');
  return `<input type="number" min="0" class="q-val input input-bordered input-sm w-20" value="${v || '1'}" />
    <select class="q-unit select select-bordered select-sm">${units}</select>${opSel}`;
}

function makeRow(c) {
  c = c || { field: 'manual_tag', op: 'include', value: '', unit: null };
  const type = FIELD_TYPE[c.field] || 'tag';
  const row = document.createElement('div');
  row.className = 'q-row flex flex-wrap items-center gap-2';
  row.innerHTML = `
    <select class="q-field select select-bordered select-sm">${FIELD_OPTIONS}</select>
    <span class="q-controls flex flex-wrap items-center gap-2 flex-1 min-w-0"></span>
    <button type="button" class="btn btn-sm btn-square q-del" title="この条件を削除">−</button>
    <button type="button" class="btn btn-sm btn-square q-add" title="条件を追加">＋</button>`;
  const fieldSel = row.querySelector('.q-field');
  fieldSel.value = c.field;
  row.querySelector('.q-controls').innerHTML = renderControls(type, c.op, c.value, c.unit, c.field);
  // 属性変更時は演算子・値コントロール（タグ候補の参照先含む）を作り直す。
  fieldSel.onchange = () => {
    const t = FIELD_TYPE[fieldSel.value] || 'tag';
    row.querySelector('.q-controls').innerHTML = renderControls(t, null, '', null, fieldSel.value);
  };
  row.querySelector('.q-add').onclick = () => { $('q-rows').appendChild(makeRow()); };
  row.querySelector('.q-del').onclick = () => {
    const rows = $('q-rows');
    if (rows.children.length > 1) row.remove();
    else row.replaceWith(makeRow()); // 最後の1行は空にリセット
  };
  return row;
}

function setRows(q) {
  const cont = $('q-rows');
  cont.innerHTML = '';
  // レガシー tags_and/tags_not を「タグ」条件へ変換して表示。
  (q.tags_and || []).forEach(t => cont.appendChild(makeRow({ field: 'tag', op: 'include', value: t })));
  (q.tags_not || []).forEach(t => cont.appendChild(makeRow({ field: 'tag', op: 'exclude', value: t })));
  (q.conditions || []).forEach(c => cont.appendChild(makeRow(c)));
  if (cont.children.length === 0) cont.appendChild(makeRow());
}

function collectConditions() {
  const conditions = [];
  $('q-rows').querySelectorAll('.q-row').forEach(row => {
    const field = row.querySelector('.q-field').value;
    const type = FIELD_TYPE[field] || 'tag';
    const op = row.querySelector('.q-op').value;
    const valEl = row.querySelector('.q-val');
    const value = (valEl.value || '').trim();
    if (!value) return; // 値が空の行は無視
    const c = { field, op, value };
    if (type === 'date') c.unit = row.querySelector('.q-unit').value;
    conditions.push(c);
  });
  return conditions;
}

// ---- モーダル制御 ----
async function openQueryModal(mode, id) {
  editingId = mode === 'edit' ? id : null;
  $('q-title').textContent = mode === 'edit' ? '条件付きパスの編集' : '条件付きパスの作成';
  if (mode === 'edit') {
    let q;
    try { q = await json(`/api/queries/${id}`); }
    catch (e) { uiToast('取得に失敗しました', 'error'); return; }
    $('q-name').value = q.name;
    $('q-desc').value = q.description || '';
    $('q-match').value = q.query.match_mode || 'all';
    setRows(q.query);
  } else {
    $('q-name').value = '';
    $('q-desc').value = '';
    $('q-match').value = 'all';
    setRows({});
  }
  $('q-modal').showModal();
  $('q-name').focus();
}

async function saveQuery() {
  const name = $('q-name').value.trim();
  if (!name) { uiToast('パス名を入力してください', 'warning'); return; }
  const desc = $('q-desc').value.trim();
  // すべて conditions で表現し、レガシー tags_* はクリアする。
  const body = {
    name,
    description: desc || null,
    match_mode: $('q-match').value,
    conditions: collectConditions(),
    tags_and: [],
    tags_not: [],
  };
  try {
    if (editingId) {
      await json(`/api/queries/${editingId}`, { method: 'PATCH', body });
      uiToast('更新しました', 'success');
    } else {
      await json('/api/queries', { method: 'POST', body });
      uiToast('条件付きパスを作成しました', 'success');
    }
    $('q-modal').close();
    await loadQueries();
  } catch (e) { uiToast('保存に失敗しました: ' + e.message, 'error'); }
}

async function deleteQuery(id, name) {
  if (!await uiConfirm(`条件付きパス「${name}」を削除しますか？\n対応する SMB パス (yozist/queries/${name}/) も無効になります。`, { danger: true })) return;
  try {
    await api(`/api/queries/${id}`, { method: 'DELETE' });
    uiToast('削除しました', 'success');
    await loadQueries();
  } catch (e) { uiToast('削除に失敗しました', 'error'); }
}

async function shareQuery(id, name) {
  const r = await uiPrompt({
    title: `「${name}」の共有URLを発行`, okText: '発行',
    fields: [{ name: 'ttl', label: '有効期限 (秒)', type: 'number', value: '3600' }],
  });
  if (!r) return;
  const ttl = parseInt(r.ttl, 10);
  if (!ttl) { uiToast('有効期限を正しく入力してください', 'warning'); return; }
  try {
    const res = await json(`/api/queries/${id}/share`, { method: 'POST', body: { ttl_secs: ttl } });
    await uiCopyUrl(location.origin + res.url, 'クエリ共有URL');
  } catch (e) { uiToast('共有URL発行に失敗しました: ' + e.message, 'error'); }
}

$('q-cancel').onclick = () => $('q-modal').close();
$('q-save').onclick = saveQuery;
init();
</script>
{% endblock %}
