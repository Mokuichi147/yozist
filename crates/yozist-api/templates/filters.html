{% extends "base.html" %}
{% block title %}yozist - フィルター一覧{% endblock %}

{% block content %}
<div id="main" class="hidden max-w-3xl mx-auto p-4 space-y-4">

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-base font-semibold">フィルター一覧</h2>
        <button class="btn btn-sm btn-primary" onclick="openQueryModal('create')">+ 新規作成</button>
      </div>
      <p class="text-xs opacity-60 mb-3 leading-relaxed">
        条件にマッチするファイル群へ任意の名前を付けてアクセスできます。
      </p>
      <div id="query-list" class="text-sm space-y-1">…</div>
    </div>
  </div>

</div>

<!-- フィルター 作成/編集モーダル（条件ビルダー） -->
<dialog id="q-modal" class="modal">
  <div class="modal-box max-w-3xl">
    <h3 id="q-title" class="font-bold text-lg mb-3">フィルターの作成</h3>

    <div class="space-y-3">
      <div>
        <label class="text-xs uppercase tracking-wider opacity-60">フィルター名</label>
        <input id="q-name" type="text" class="input input-bordered input-sm w-full mt-1" placeholder="例: 仕事メモ" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider opacity-60">説明 (任意)</label>
        <input id="q-desc" type="text" class="input input-bordered input-sm w-full mt-1" />
      </div>

      <div>
        <div class="flex items-center gap-2 text-sm mb-2">
          <span class="opacity-70">次の</span>
          <select id="q-match" class="select select-bordered select-xs">
            <option value="all">すべて</option>
            <option value="any">いずれか</option>
          </select>
          <span class="opacity-70">の条件に一致するファイル</span>
        </div>
        <div id="q-rows" class="space-y-2"></div>
        <button type="button" id="q-add-row" class="btn btn-xs btn-ghost mt-2">＋ 条件を追加</button>
      </div>
    </div>

    <div class="modal-action">
      <button id="q-cancel" class="btn btn-sm">キャンセル</button>
      <button id="q-save" class="btn btn-sm btn-primary">保存</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- タグ候補は種別ごとに分ける（手動タグなら手動タグのみを補完） -->
<datalist id="tag-options-manual"></datalist>
<datalist id="tag-options-system"></datalist>
<datalist id="tag-options-ai"></datalist>
<datalist id="tag-options-all"></datalist>
<datalist id="series-options"></datalist>
{% endblock %}

{% block script %}
<script src="/ui/pages/filters.js"></script>
{% endblock %}
