{% extends "base.html" %}
{% block title %}yozist - commit{% endblock %}
{% block subtabs %}<span class="opacity-40">›</span><a id="back-detail" href="#" class="link link-hover">詳細</a><span class="opacity-40">›</span><span class="font-semibold">コミット</span>{% endblock %}

{% block content %}
<div id="not-found" class="hidden max-w-md mx-auto mt-24">
  <div class="alert alert-error">
    <span id="not-found-msg">コミットが見つかりません。</span>
  </div>
</div>

<div id="main" class="hidden max-w-5xl mx-auto p-4">
  <div class="mb-3 text-sm">
    <a id="back-link" href="#" class="link link-hover">← ファイル詳細へ戻る</a>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-start justify-between gap-2 flex-wrap">
        <div>
          <h2 id="fc-name" class="card-title text-lg break-all">…</h2>
          <div id="fc-meta" class="text-xs opacity-60 break-all mt-1"></div>
        </div>
        <div class="flex flex-wrap gap-2 shrink-0">
          <button id="fc-rollback" class="btn btn-sm btn-warning btn-outline hidden">このバージョンに戻す</button>
          <a id="fc-raw" href="#" class="btn btn-sm" target="_blank">生データ</a>
        </div>
      </div>

      <div class="divider my-2"></div>

      <div id="fc-content" class="min-h-[2rem]">…</div>
    </div>
  </div>
</div>
{% endblock %}

{% block script %}
<!-- 単一表示の共有メディアビュープラグイン（image/video/audio/pdf）。file_detail と共通。
     base.html の共有 ViewRuntime に自己登録する。テキスト/不明はこのページ固有の
     分割取得ビューアを使う。 -->
<script src="/ui/plugins/viewer-media.js"></script>
<script src="/ui/pages/file_commit.js"></script>
{% endblock %}
